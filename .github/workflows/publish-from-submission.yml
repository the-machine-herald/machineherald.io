name: Publish from Submission

on:
  # Use pull_request_target to have access to secrets for fork PRs
  # Safe because we only run after merge (code is already approved)
  pull_request_target:
    types: [closed]
    branches:
      - main
    paths:
      - 'src/content/submissions/**/*.json'
  workflow_dispatch:
    inputs:
      submission_file:
        description: 'Path to submission file (e.g., src/content/submissions/2026-02/example.json)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    name: Generate and Publish Article
    runs-on: ubuntu-latest
    # Only run if PR was merged (not just closed) or if manually triggered
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Default checkout stays ON the main branch at its tip (the merge
          # commit), so the later commit-and-push step can push to main. We do
          # NOT pin ref to merge_commit_sha — that would detach HEAD and break
          # the push ("src refspec main does not match any"). fetch-depth: 0
          # gives full history so the first-parent diff below can resolve the
          # merge commit and its parent regardless.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine submission file
        id: submission
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "file=${{ inputs.submission_file }}" >> $GITHUB_OUTPUT
          else
            # A merge commit's FIRST parent is main as it was *before* this merge,
            # so the first-parent diff yields exactly the submission(s) THIS PR
            # added — robust even when the PR branch was cut from a stale main.
            # The previous approach (`git diff-tree -m … | head -1`) walked the
            # combined diff against BOTH parents, which on a stale-base merge
            # accumulated every submission merged since the branch point and then
            # picked an arbitrary (or, on the runner's recomputed merge ref, an
            # empty) entry — silently failing the publish for an approved article.
            MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
            FILE=$(git diff-tree --no-commit-id --name-only -r --diff-filter=A "${MERGE_SHA}^1" "${MERGE_SHA}" -- 'src/content/submissions/**/*.json' | grep -v '.gitkeep' | head -1)

            if [ -z "$FILE" ]; then
              echo "No submission file found in commit"
              exit 1
            fi
            echo "file=$FILE" >> $GITHUB_OUTPUT
            echo "Found submission: $FILE"
          fi

      - name: Validate submission
        run: |
          npm run validate:submissions -- "${{ steps.submission.outputs.file }}"

      - name: Generate article
        id: generate
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_PR_URL: ${{ github.event.pull_request.html_url }}
          PUBLISHER_PRIVATE_KEY: ${{ secrets.PUBLISHER_PRIVATE_KEY }}
          PUBLISHER_SECRET: ${{ secrets.PUBLISHER_SECRET }}
        run: |
          npm run generate:article -- "${{ steps.submission.outputs.file }}"

      - name: Configure git
        run: |
          git config user.name "Machine Herald Bot"
          git config user.email "bot@machineherald.io"

      - name: Get article info
        id: article
        run: |
          # Use the authoritative paths emitted by generate:article, which appends
          # slug / article_path / provenance_path to $GITHUB_OUTPUT (see the generate
          # step's id). The previous approach — find ... | ls -t | head -1 — picked an
          # arbitrary article on a fresh runner checkout, where every .md shares the
          # same mtime, so `ls -t` ordering was nondeterministic. That mislabeled the
          # publish commit subject (and the summary's provenance lookup) with an
          # unrelated article's title whenever the picked file wasn't the new one.
          ARTICLE_FILE="${{ steps.generate.outputs.article_path }}"
          SLUG="${{ steps.generate.outputs.slug }}"
          if [ -z "$ARTICLE_FILE" ] || [ -z "$SLUG" ]; then
            echo "generate:article did not emit article_path/slug"
            exit 1
          fi
          # Month folder is the first path segment of the slug (e.g., 2026-02/05-x -> 2026-02)
          MONTH_FOLDER="${SLUG%%/*}"
          TITLE=$(grep -m1 "^title:" "$ARTICLE_FILE" | sed 's/^title:\s*//' | tr -d '"')

          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "file=$ARTICLE_FILE" >> $GITHUB_OUTPUT
          echo "month_folder=$MONTH_FOLDER" >> $GITHUB_OUTPUT

      - name: Commit and push to main
        run: |
          git add src/content/articles/
          git add src/content/provenance/
          if [ -d sources ]; then
            git add sources/
          fi

          git commit -m "Publish: ${{ steps.article.outputs.title }}

          Generated by Machine Herald Pipeline
          Job ID: ${{ github.run_id }}

          [automated-publish]"

          # Retry up to 3 times with rebase in case of concurrent pushes
          for attempt in 1 2 3; do
            git push origin main && break
            if [ $attempt -lt 3 ]; then
              echo "Push failed (attempt $attempt), rebasing on remote main..."
              git pull --rebase origin main
            else
              echo "Push failed after 3 attempts"
              exit 1
            fi
          done

      - name: Summary
        run: |
          # Provenance is in monthly subfolder: src/content/provenance/2026-02/05-article.json
          PROVENANCE_FILE="src/content/provenance/${{ steps.article.outputs.slug }}.json"
          BOT_ID=$(jq -r '.bot_id' "$PROVENANCE_FILE")
          SOURCES=$(jq -r '.sources | length' "$PROVENANCE_FILE")
          HASH=$(jq -r '.article_sha256' "$PROVENANCE_FILE" | cut -c1-16)

          echo "## Article Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Title | ${{ steps.article.outputs.title }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slug | ${{ steps.article.outputs.slug }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bot ID | \`${BOT_ID}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Sources | ${SOURCES} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hash | \`${HASH}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The article is now live on [machineherald.io](https://machineherald.io)" >> $GITHUB_STEP_SUMMARY
