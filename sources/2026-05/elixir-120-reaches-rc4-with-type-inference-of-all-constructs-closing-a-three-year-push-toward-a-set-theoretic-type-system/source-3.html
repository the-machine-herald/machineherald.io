3e it produces a false positive for only one check \\u003ccode\\u003eCredo.Check.Readability.ModuleDoc\\u003c/code\\u003e for all modules in my project. \\u003cimg src=\\\&quot;https://elixirforum.com/images/emoji/apple/face_with_hand_over_mouth.png?v=15\\\&quot; title=\\\&quot;:face_with_hand_over_mouth:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:face_with_hand_over_mouth:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eEdit\\u003c/strong\\u003e: I have found the issue. It appears that \\u003ccode\\u003ecredo\\u003c/code\\u003e expected \\u003ccode\\u003eAST\\u003c/code\\u003e meta for block expression to be an empty list, but in \\u003ccode\\u003e1.20.0-rc.0\\u003c/code\\u003e it contains additional \\u003ccode\\u003eline\\u003c/code\\u003e and \\u003ccode\\u003ecolumn\\u003c/code\\u003e information.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eEdit 2\\u003c/strong\\u003e: I have created a quick fix PR: \\u003ca href=\\\&quot;https://github.com/rrrene/credo/pull/1241\\\&quot; class=\\\&quot;inline-onebox\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\\u003eFix 1.20.x compatibility issue with block expression AST by Eiji7 · Pull Request #1241 · rrrene/credo · GitHub\\u003c/a\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eAs a temporary workaround you can use my fork by simply changing the \\u003ccode\\u003ecredo\\u003c/code\\u003e dependency to:\\u003c/p\\u003e\\n\\u003cpre data-code-wrap=\\\&quot;elixir\\\&quot;\\u003e\\u003ccode class=\\\&quot;lang-elixir\\\&quot;\\u003e{:credo, branch: \\\&quot;fix-1.20.x-block-ast-compatibility\\\&quot;, github: \\\&quot;Eiji7/credo\\\&quot;, runtime: false},\\n\\u003c/code\\u003e\\u003c/pre\\u003e\\n\\u003cp\\u003eAll other tools (ExUnit tests, ex_coveralls report and dialyzer report) does not seem to change (as expected)\\u003c/p\\u003e\\n\\u003chr\\u003e\\n\\u003cp\\u003eThe only one thing I would like u003c/code\\u003e meta for block expression to be an empty list, but in \\u003ccode\\u003e1.20.0-rc.0\\u003c/code\\u003e it contains additional \\u003ccode\\u003eline\\u003c/code\\u003e and \\u003ccode\\u003ecolumn\\u003c/code\\u003e information.\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eClassic. Elixir 1.19 did this for other expressions / constructs and some libs had to adapt (such as this issue of \\u003ca href=\\\&quot;https://github.com/BartOtten/routex/commit/d6fec6e4d0b842bc7e664f4a1b5c3dd96dc316ec\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\\u003eRoutex\\u003c/a\\u003e).\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003cstrong\\u003eLib maintainers using AST be aware\\u003c/strong\\u003e: wildcard match ‘_meta’ the metadata instead of an empty list ‘\\u003cspan class=\\\&quot;chcklst-box fa fa-square-o fa-fw\\\&quot;\\u003e\\u003c/span\\u003e’\\u003c/p\\u003e\\n\\u003cp\\u003eGranted we would have done so before, but I expect most simply adapted AST and never had a thought about that empty metadata list.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:7,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-09T20:55:27.917Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:5,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:1,\&quot;reads\&quot;:480,\&quot;readers_count\&quot;:479,\&quot;score\&quot;:161.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;Bart Otten\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recove uot;,\&quot;created_at\&quot;:\&quot;2026-01-09T21:26:41.163Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003caside class=\\\&quot;quote group-Elixir-Core-Team quote-modified\\\&quot; data-username=\\\&quot;Elixir\\\&quot; data-post=\\\&quot;1\\\&quot; data-topic=\\\&quot;73927\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;title\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;quote-controls\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003cimg alt=\\\&quot;\\\&quot; width=\\\&quot;24\\\&quot; height=\\\&quot;24\\\&quot; src=\\\&quot;https://elixirforum.com/user_avatar/elixirforum.com/elixir/48/15419_2.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e Elixir:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eAlso, please let us know about performance. If Elixir v1.20 compiles slower than v1.19, then ping us too. \\u003ccode\\u003emix compile –force –profile time\\u003c/code\\u003e is a good tool to measure it (paticularly the times reported at the end).\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eMy codebase is actually faster compiling with 1.20-rc (otp28) but only just couple dozen ms and well within margins of error. Nice job!\\u003c/p\\u003e\\n\\u003cp\\u003eOnly curiosity I have is that the compiler catches type mismatches in our tests, tests that were testing errors on wrong input types ha! Suppose in 1.20 we will be able to delete those!\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:9,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-09T21:26:41.163Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:9,\&quot;reads\&quot;:455,\&quot;readers_count\&quot;:454,\&quot;score\&quot;:331.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;Jeregrine\&qu ;updated_at\&quot;:\&quot;2026-01-10T07:19:23.711Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:0,\&quot;reads\&quot;:413,\&quot;readers_count\&quot;:412,\&quot;score\&quot;:132.6,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;Dany Marcoux\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:1}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:22693,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs/73927/10\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:381616,\&quot;name\&quot;:\&quot;Tomasz Sulima\&quot;,\&quot;username\&quot;:\&quot;Eiji\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/elixirforum.com/eiji/{size}/36743_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-01-10T07:31:09.945Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eUnless \\u003ccode\\u003eElixir\\u003c/code\\u003e type system would generate a \\u003ccode\\u003e@spec\\u003c/code\\u003e or \\u003ccode\\u003eex_doc\\u003c/code\\u003e would support \\u003ccode\\u003eElixir\\u003c/code\\u003e’s Typespec natively \\u003ccode\\u003edialyzer\\u003c/code\\u003e would have a great value at least in documentation purposes. From unknown types to mismatched ones. There are still lots of cases that \\u003ccode\\u003edialyzer\\u003c/code\\u003e uses. Also it’s very useful when you assume that your complex logic always returns specific data and \\u003ccode\\u003edialyzer\\u003c/code\\u003e warns sometimes it’s not a case. That’s very useful in code refactor when you forgot to update some small part of a bigger module.\\u003c/p\\u003e\\n\\u003cp\\u003eI wonder if \\u003ccode\\u003eElixir\\u003c/code\\u003e core team have any further plans about improvements to type system like mentioned \\u003ccode\\u003eex_doc\\u003c/code\\u003e support or auto-generation of function \\u003ccode\\u003e@spec\\u003c/code\\u003e. In past we had discussions about new type definitions starting with \\u003ccode\\u003e$\\u003c/code\\u003e character, but I’m not sure how those topics ended up like if those are on the official roadmap or so.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:11,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-10T07:31:09.945Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:10,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:1,\&quot;reads\&quot;:408,\&quot;readers_count\&quot;:407,\&quot;score\&quot;:151.6,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;Tomasz Sulima\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_c l-constructs/73927/13\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:381619,\&quot;name\&quot;:\&quot;Tomasz Sulima\&quot;,\&quot;username\&quot;:\&quot;Eiji\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/elixirforum.com/eiji/{size}/36743_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-01-10T07:48:55.427Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eYeah, I remember that the type system allowed more stuff. Support for negations would not look good, but is rather possible - it’s just about list every type except the excluded one. \\u003cimg src=\\\&quot;https://elixirforum.com/images/emoji/apple/sweat_smile.png?v=15\\\&quot; title=\\\&quot;:sweat_smile:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:sweat_smile:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eGood to know they are on roadmap, but 15 months is a lot of time especially in our rapidly changing world. Within that time almost everything can change. On \\u003ccode\\u003eGitHub\\u003c/code\\u003e there is a discussion that if situation would go that way \\u003ccode\\u003eTailwind\\u003c/code\\u003e sooner or later may become an abandonware as they loose the traffic (by 80% or so) to their documentation (which is the only place for their paid plans) due to increased LLM usage. Looks like they already lost 75% jobs there. \\u003cimg src=\\\&quot;https://elixirforum.com/images/emoji/apple/scream.png?v=15\\\&quot; title=\\\&quot;:scream:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:scream:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:14,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-10T07:48:55.427Z\&quot;,\&quot te\&quot;:\&quot;/user_avatar/elixirforum.com/lostkobrakai/{size}/3072_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-01-10T08:06:21.341Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003caside class=\\\&quot;quote no-group\\\&quot; data-username=\\\&quot;Eiji\\\&quot; data-post=\\\&quot;14\\\&quot; data-topic=\\\&quot;73927\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;title\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;quote-controls\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003cimg alt=\\\&quot;\\\&quot; width=\\\&quot;24\\\&quot; height=\\\&quot;24\\\&quot; src=\\\&quot;https://elixirforum.com/user_avatar/elixirforum.com/eiji/48/36743_2.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e Eiji:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eSupport for negations would not look good, but is rather possible - it’s just about list every type except the excluded one.\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eOnly for the simple cases. Consider that there‘s also „anything, but a map with a \\u003ccode\\u003e:name\\u003c/code\\u003e key“ and you‘re thorougly in unrepresentable as typespec territory. You cannot write out all possible maps, which do not have a specific key.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:15,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-10T08:06:21.341Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:14,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:3,\&quot;reads\&quot;:380,\&quot;readers_count\&quot;:379,\&quot;score\&quot;:121.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;Benjamin Milde\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;\&quot;,\&quot;reply_to_user\&quot;:{\&quot;id\&quot;:1118,\&quot;username\&quot;:\&quot;Eiji\&quot;,\&quot;name\&quot;:\&quot;Tomasz Sulima\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/elixirforum.com/eiji/{size}/36743_2.png\&quot;},\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:2}],\&quot;moderator\&quot;:true,\&quot;admin\&quot;:false,\&quot;staff\&quot;:true,\&quot;user_id\&quot;:3078,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs/73927/15\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:381638,\&quot;name\&quot;:\&quot;\&quot;,\&quot;username\&quot;:\&quot;michallepicki\&quot;,\&quot;avatar_template\&quot;:\&quot;/letter_avatar_proxy/v4/letter/m/5f9b8f/{size}.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-01-10T18:19:11.071Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003e\\u003ccode\\u003e1.20.rc.0\\u003c/code\\u003e perf is good so far, compile times are marginally lower compared to \\u003ccode\\u003e1.19.5\\u003c/code\\u003e. The typechecker highlighted some dead/unreachable code to clean up, and a few missing virtual field declarations on an Ecto schema.\\u003c/p\\u003e\\n\\u003cp\\u003eAs someone else already mentioned, some tests that were asserting on \\u003ccode\\u003eArgumentError\\u003c/code\\u003e or \\u003ccode\\u003eFunctionClauseError\\u003c/code\\u003e being thrown started to warn. Maybe there could be situations in which one would want to keep such tests, then it would be good to be able to suppress those compilation warnings somehow.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:16,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-10T18:21:47.092Z\&quot;,\&quot;reply_count\&quot;:2,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:0,\&quot;reads\&quot;:370,\&quot;readers_count\&quot;:369,\&quot;score\&quot;:84.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:1186,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs/73927/16\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:381657,\&quot;name\&quot;:\&quot;Dalton Lang\&quot;,\&quot;username\&quot;:\&quot;GrammAcc\&quot;,\&quot;avatar_template\&quot;:\&quot;/letter_avatar_proxy/v4/letter/g/9dc877/{size}.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-01-10T22:19:23.663Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eI actually have this exact use-case in one of my projects. I have some common repo functions for Ecto Schema modules \\u003ccode\\u003ecreate/1\\u003c/code\\u003e, \\u003ccode\\u003ecreate!/1\\u003c/code\\u003e, \\u003ccode\\u003eread/1\\u003c/code\\u003e, \\u003ccode\\u003eread!/1\\u003c/code\\u003e, \\u003ccode\\u003eupdate/2\\u003c/code\\u003e, \\u003ccode\\u003eupdate!/2\\u003c/code\\u003e, \\u003ccode\\u003edelete/1\\u003c/code\\u003e, and \\u003ccode\\u003edelete!/1\\u003c/code\\u003e for simple single-row non-join CRUD operations. I have these defined in a \\u003ccode\\u003eModels.Base\\u003c/code\\u003e module and I conditionally define the \\u003ccode\\u003ecreate\\u003c/code\\u003e, \\u003ccode\\u003eupdate\\u003c/code\\u003e, and \\u003ccode\\u003edelete\\u003c/code\\u003e operations based on a \\u003ccode\\u003e:read_only\\u003c/code\\u003e option to the \\u003ccode\\u003e__using__/1\\u003c/code\\u003e macro. I’ve only just started doing this, so it’s not a big deal if I need to figure out an alternative, but I do like having tests in my test suite that assert my read-only schema modules throw an \\u003ccode\\u003eUndefinedFunctionError\\u003c/code\\u003e when calling any of the write operation functions. Just some extra piece of mind in case I forget the \\u003ccode\\u003eread_only: true\\u003c/code\\u003e when defining/updating a schema module. This is not a situation that would be caught by the type system since a call to \\u003ccode\\u003ecreate!/1\\u003c/code\\u003e on a should-be-read-only module would only give a typing violation if I correctly remembered to put \\u003ccode\\u003eread_only: true\\u003c/code\\u003e.\\u003c/p\\u003e\\n\\u003cp\\u003eAnother situation that is more common/realistic is testing program inputs. A static type system can’t protect against invalid data coming into the program at runtime, so if the application takes any kind of user input, having negative test cases to assert bad inputs are handled gracefully is useful. This is a common issue in TypeScript projects because devs get it into their heads that the compiler will catch all the type errors, and then it crashes at runtime due to bad data input by the user. Even in Elixir where we “let it crash”, that only works in embedded applications that don’t have a user looking at the loading bar when the LiveView reloads, so negative tests are good. \\u003cimg src=\\\&quot;https://elixirforum.com/images/emoji/apple/slight_smile.png?v=15\\\&quot; title=\\\&quot;:slight_smile:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:slight_smile:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eAll that being said, I am 100% in favor of better type inference if it doesn’t come with huge performance costs. The more the compiler can do for me without extra code/effort on my part the better. Thanks Elixir Team!\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:17,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-10T22:19:23.663Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:16,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:3,\&quot;reads\&quot;:367,\&quot;readers_count\&quot;:366,\&quot;score\&quot;:108.4,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;Dalton Lang\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:nu oxy/v4/letter/m/5f9b8f/48.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e michallepicki:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eMaybe there could be situations in which one would want to keep such tests, then it would be good to be able to suppress those compilation warnings somehow.\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eIndeed. For the record, in the Elixir repo, these rests are either being removed or tested by using the \\u003ccode\\u003eProcess.get(:unused, wrong_arg)\\u003c/code\\u003e hack \\u003ca href=\\\&quot;https://github.com/search?q=repo%3Aelixir-lang%2Felixir%20Process.get\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\\u003e(examples)\\u003c/a\\u003e.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:18,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-11T09:33:16.446Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:16,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:6,\&quot;reads\&quot;:331,\&quot;readers_count\&quot;:330,\&quot;score\&quot;:201.2,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;Jean Klingler\&quot;,\&quot;primary_group_name\&quot;:\&quot;Elixir-Core-Team\&quot;,\&quot;flair_name\&quot;:\&quot;Elixir-Core-Team\&quot;,\&quot;flair_url\&quot;:\&quot;/uploads/default/original/2X/b/bd71e4f38addd2e93ec1eba0667e332115b01074.png\&quot;,\&quot;flair_bg_color\&quot;:\&quot;DDC6E8\&quot;,\&quot;flair_color\&quot;:\&quot;\&quot;,\&quot;flair_group_id\&quot;:42,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;link_counts\&quot;:[{\&quot;url\&quot;:\&quot;https://github.com/search?q=repo%3Aelixir-lang%2Felixir%20Process.get\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;clicks\&quot;:26}],\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;Elixir Core Team\&quot;,\&quot;title_is_group\&quot;:true,\&quot;reply_to_user\&quot;:{\&quot;id\&quot;:1186,\&quot;username\&quot;:\&quot;michallepicki\&quot;,\&quot;name\&quot;:\&quot;\&quot;,\&quot;avatar_template\&quot;:\&quot;/letter_avatar_proxy/v4/letter/m/5f9b8f/{size}.png\&quot;},\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:5}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:15305,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:4,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs/73927/18\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:381680,\&quot;name\&quot;:\&quot;José Valim\&quot;,\&quot;username\&quot;:\&quot;josevalim\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/elixirforum.com/josevalim/{size}/1787_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-01-11T16:21:34.854Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003caside class=\\\&quot;quote no-group\\\&quot; data-username=\\\&quot;GrammAcc\\\&quot; data-post=\\\&quot;17\\\&quot; data-topic=\\\&quot;73927\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;title\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;quote-controls\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003cimg alt=\\\&quot;\\\&quot; width=\\\&quot;24\\\&quot; height=\\\&quot;24\\\&quot; src=\\\&quot;https://elixirforum.com/letter_avatar_proxy/v4/letter/g/9dc877/48.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e GrammAcc:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eAnother situation that is more common/realistic is testing program inputs.\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eTo add to \\u003ca class=\\\&quot;mention\\\&quot; href=\\\&quot;/u/sabiwara\\\&quot;\\u003e@sabiwara\\u003c/a\\u003e’s workaround, the type system won’t warn if the program input is within its valid type. For example, if you have a function that expects integers only from 2..26 (like Integer.parse/2), passing an invalid input such as 0 won’t trigger any warning. However, if you give a boolean, then a warning is emitted.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:19,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-11T16:21:34.854Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:17,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:0,\&quot;reads\&quot;:335,\&quot;readers_count\&quot;:334,\&quot;score\&quot;:192.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;José Valim\&quot;,\&quot;primary_group_name\&quot;:\&quot;livebook_core_team\&quot;,\&quot;flair_name\&quot;:\&quot;Elixir-Core-Team\&quot;,\&quot;flair_url\&quot;:\&quot;/uploads/default/original/2X/b/bd71e4f38addd2e93ec1eba0667e332115b01074.png\&quot;,\&quot;flair_bg_color\&quot;:\&quot;DDC6E8\&quot;,\&quot;flair_color\&quot;:\&quot;\&quot;,\&quot;flair_group_id\&quot;:42,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;Creator of Elixir\&quot;,\&quot;title_is_group\&quot;:false,\&quot;reply_to_user\&quot;:{\&quot;id\&quot;:31341,\&quot;username\&quot;:\&quot;GrammAcc\&quot;,\&quot;name\&quot;:\&quot;Dalton Lang\&quot;,\&quot;avatar_template\&quot;:\&quot;/letter_avatar_proxy/v4/letter/g/9dc877/{size}.png\&quot;},\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:6}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:true,\&quot;staff\&quot;:true,\&quot;user_id\&quot;:703,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs/73927/19\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:381692,\&quot;name\&quot;:\&quot;Bart Otten\&quot;,\&quot;username\&quot;:\&quot;BartOtten\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/elixirforum.com/bartotten/{size}/25440_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-01-11T17:52:30.845Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eNo problem. We can always make a map with keys 1..26 so we can catch the issue as the keys are checked.\\u003c/p\\u003e\\n\\u003cp\\u003eJokes aside: any chance this could be done with this type system? Seems not impossible to me (but I have no clue)\\u003c/p\\u003e\\n\\u003cp\\u003e(ps. I know it wont safe us from user input, but maybe it can advice to add guards to the outer layer for fail-fast)\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:20,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-11T17:58:14.993Z\&quot;,\&quot;reply_count\&quot;:2,\&quot;reply_to_post_number\&quot;:19,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:0,\&quot;reads\&quot;:333,\&quot;readers_count\&quot;:332,\&quot;score\&quot;:76.6,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;Bart Otten\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;\&quot;,\&quot;reply_to_user\&quot;:{\&quot;id\&quot;:703,\&quot;username\&quot;:\&quot;josevalim\&quot;,\&quot;name\&quot;:\&quot;José Valim\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/elixirforum.com/josevalim/{size}/1787_2.png\&quot;},\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:3262,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs/73927/20\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:381694,\&quot;name\&quot;:\&quot;Dalton Lang\&quot;,\&quot;username\&quot;:\&quot;GrammAcc\&quot;,\&quot;avatar_template\&quot;:\&quot;/letter_avatar_proxy/v4/letter/g/9dc877/{size}.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-01-11T18:26:12.225Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eRe: negative tests. I’m currently using \\u003ccode\\u003eapply/3\\u003c/code\\u003e for these \\u003ccode\\u003eUndefinedFunctionError\\u003c/code\\u003e tests since it’s a bit more intentional than a generic \\u003ccode\\u003eget\\u003c/code\\u003e on the module, but I don’t like the idea of using a workaround like that for a defined function where I’m passing in a boolean or string instead of an integer.\\u003c/p\\u003e\\n\\u003cp\\u003eIt’s actually a very common error if the FE is standalone JS and not server rendered for someone to accidentally call \\u003ccode\\u003e.toString()\\u003c/code\\u003e on a number before serializing, and then the JSON field gets parsed as \\u003ccode\\u003e\\\&quot;1”\\u003c/code\\u003e instead of \\u003ccode\\u003e1\\u003c/code\\u003e on the BE. For most applications, this isn’t a big deal, but I’ve ran into this when writing a very strict input validation layer before, so I think having a way to selectively disable type inference for test modules is a good feature to have. I don’t think we should have \\u003ccode\\u003e@type-ignore\\u003c/code\\u003e pragmas or anything that could be used anywhere we want cause that would encourage type hell, and Elixir’s \\u003ccode\\u003edynamic()\\u003c/code\\u003e is much better than other langague’s \\u003ccode\\u003eany\\u003c/code\\u003e, so I don’t think we will need it in application code.\\u003c/p\\u003e\\n\\u003cp\\u003eSome code is just intentionally written to violate application constraints though. Namely negative test cases. \\u003cimg src=\\\&quot;https://elixirforum.com/images/emoji/apple/slight_smile.png?v=15\\\&quot; title=\\\&quot;:slight_smile:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:slight_smile:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eHopefully, fuzz testing and simulation testing gets easier to implement at small scales, so this problem would eventually go away, but for now, a workaround in the language or library layers instead of the user’s test code would be ideal.\\u003c/p\\u003e\\n\\u003cp\\u003eMaybe this could be solved with a \\u003ca href=\\\&quot;https://hexdocs.pm/mix/main/Mix.Tasks.Compile.html#module-compilers\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\\u003ecustom mix compiler\\u003c/a\\u003e for ExUnit modules that disables type inference (but not type checking in general)?\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:21,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-11T18:27:20.008Z\&quot;,\&quot;reply_count\&quot;:2,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:1,\&quot;reads\&quot;:346,\&quot;readers_count\&quot;:345,\&quot;score\&quot;:129.2,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:73927,\&quot;topic_slug\&quot;:\&quot;elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs\&quot;,\&quot;display_username\&quot;:\&quot;Dalton Lang\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;link_counts\&quot;:[{\&quot;url\&quot;:\&quot;https://hexdocs.pm/mix/main/Mix.Tasks.Compile.html#module-compilers\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;title\&quot;:\&quot;mix compile — Mix v1.20.0-rc.0\&quot;,\&quot;clicks\&quot;:2}],\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:1}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:31341,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/elixir-v1-20-0-rc-0-and-rc-1-released-type-inference-of-all-constructs/73927/21\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:381695,\&quot;name\&quot;:\&quot;Dalton Lang\&quot;,\&quot;username\&quot;:\&quot;GrammAcc\&quot;,\&quot;avatar_template\&quot;:\&quot;/letter_avatar_proxy/v4/letter/g/9dc877/{size}.png\&quot;,\&quot;created_at\&quot;:\&quot;2026-01-11T18:29:49.326Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eWould be great if the language tooling could somehow encourage this practice. I always advocate for doing all input parsing as close to the application boundary as possible at work and in community projects. It saves so much time later on to know that any data structure that makes it into the service layer is valid. \\u003cimg src=\\\&quot;https://elixirforum.com/images/emoji/apple/slight_smile.png?v=15\\\&quot; title=\\\&quot;:slight_smile:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:slight_smile:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eNot sure how that would be detected though. Maybe more of a linter thing than compiler warning since it’s more of a code style/pattern issue than an actual technical problem with the code?\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:22,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:41,\&quot;updated_at\&quot;:\&quot;2026-01-11T18:29:49.326Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:20,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:0,\&quot;reads\&quot;:319,\&quot;readers_count\&quot;:318,\&quot;score\&quot;:63.8,\&quot;yours gory_id\&quot;:113,\&quot;notification_level\&quot;:1,\&quot;topic_template\&quot;:\&quot;**All threads in this section are reviewed before being made live - please follow these guidelines when posting:**\\n\\n- Please note this section is for project maintainers to announce/post details about their own libraries that can be used in Elixir projects (if you&#39;ve found a cool library you&#39;d like to share please use this thread: https://elixirforum.com/t/interesting-cool-libraries-youve-found/69978)\\n\\n- When composing your thread title please use the following format: **Name of library - short description of library** (please do not add anything else, do not use prefixes like &#39;announcing&#39; or any other commentary).\\n\\n- Please post one thread per library/package and then post updates into the thread (this allows people to watch or mute the thread). Alternatively, feel free to post updates in a new thread in the Library Updates section (but ensure you have a main thread in this section first). See this thread for details: https://elixirforum.com/t/new-library-updates-section/71144/\\n\\n- Please ensure the thread contains all the relevant details about your library (please don&#39;t post just a link). Please include the name, a description, any other info then links to the repo or hex page (or any other links) towards the end of the post, with the link to the repo right at the end on a separate line so that repo info embeds into the post  (see these threads to get an idea of format: https://elixirforum.com/t/discolog-use-discord-as-a-logging-service-and-error-tracking-solution/65730 or https://elixirforum.com/t/garnish-a-terminal-ui-framework-for-ssh-based-applications/65455\\n\\n- If referring to any other library please be kind and respectful (no disparaging remarks).\\n\\n- Please add a tag for your library (library name as the tag is fine) and then subscribe to the tag if you would like to be notified of all threads that are tagged with it :-)\\n\\n               <blockquote>
<p>Today we celebrate 15 years since <a href="https://github.com/elixir-lang/elixir/commit/337c3f2d569a42ebd5fcab6fef18c5e012f9be5b" rel="noopener nofollow ugc">Elixir’s first commit</a>! To mark the occasion, we are glad to announce the first release candidate for Elixir v1.20, which performs type inference of all language constructs, with increasing precision.</p>
<p>In this blog post, we will break down exactly what this means, and what to expect in the short and medium term of the language evolution (roughly the next 15 months).</p>
</blockquote>
<p>Read the full announcement here:</p>

  <p>Today we celebrate 15 years since Elixir’s first commit! To mark the occasion, we are glad to announce the first release candidate for Elixir v1.20, which performs type inference of all language constructs, with increasing precision.</p>

  <p>Type system improvements
This release includes type inference of all constructs.
Type inference of function calls
Elixir now performs inference of whole functions. The best way to show the new capa...</p>

<p>TL;DR: this release adds type inference of all constructs. At the moment, we expect false positives (warnings that should not be emited), please let us know if you run into those. Also, please let us know about performance. If Elixir v1.20 compiles slower than v1.19, then ping us too. `mix compile –force –profile time` is a good tool to measure it (paticularly the times reported at the end).</p>

            <div class='post' itemprop='text'>
              <p>Amazing work! <img src="https://elixirforum.com/images/emoji/apple/heart.png?v=15" title=":heart:" class="emoji" alt=":heart:" loading="lazy" width="20" height="20"></p>
<p>I found something very surprising … I have 2 <code>Elixir</code> versions installed using <code>mise</code>:</p>
<pre data-code-wrap="bash"><code class="lang-bash">$ mise ls
Tool           Version             Source                      Requested          
# …
elixir         1.19.5-otp-28      
elixir         1.20.0-rc.0-otp-28  ~/.config/mise/config.toml  1.20.0-rc.0-otp-28
erlang         28.3                ~/.config/mise/config.toml  latest
# …
</code></pre>
<p>On the first one <code>1.19.5-otp-28</code> the <code>credo</code> tool does not emits any issues, but in <code>1.20.0-rc.0-otp-28</code> it produces a false positive for only one check <code>Credo.Check.Readability.ModuleDoc</code> for all modules in my project. <img src="https://elixirforum.com/images/emoji/apple/face_with_hand_over_mouth.png?v=15" title=":face_with_hand_over_mouth:" class="emoji" alt=":face_with_hand_over_mouth:" loading="lazy" width="20" height="20"></p>
<p><strong>Edit</strong>: I have found the issue. It appears that <code>credo</code> expected <code>AST</code> meta for block expression to be an empty list, but in <code>1.20.0-rc.0</code> it contains additional <code>line</code> and <code>column</code> information.</p>
<p><strong>Edit 2</strong>: I have created a quick fix PR: <a href="https://github.com/rrrene/credo/pull/1241" class="inline-onebox" rel="noopener nofollow ugc">Fix 1.20.x compatibility issue with block expression AST by Eiji7 · Pull Request #1241 · rrrene/credo · GitHub</a></p>
<p>As a temporary workaround you can use my fork by simply changing the <code>credo</code> dependency to:</p>
<pre data-code-wrap="elixir"><code class="lang-elixir">{:credo, branch: "fix-1.20.x-block-ast-compatibility", github: "Eiji7/credo", runtime: false},
</code></pre>
<p>All other tools (ExUnit tests, ex_coveralls report and dialyzer report) does not seem to change (as expected)</p>
<hr>
<p>The only one thing I would like to see fixed in <code>dialyxer</code> output are <strong>OTP 28</strong> related warnings when building <code>PLT</code>, but as mentioned above it’s the same behaviour as in older <code>Elixir</code> releases and besides that the checks so far works without any problem.</p>

            <div class='post' itemprop='text'>
              <p>Unless <code>Elixir</code> type system would generate a <code>@spec</code> or <code>ex_doc</code> would support <code>Elixir</code>’s Typespec natively <code>dialyzer</code> would have a great value at least in documentation purposes. From unknown types to mismatched ones. There are still lots of cases that <code>dialyzer</code> uses. Also it’s very useful when you assume that your complex logic always returns specific data and <code>dialyzer</code> warns sometimes it’s not a case. That’s very useful in code refactor when you forgot to update some small part of a bigger module.</p>
<p>I wonder if <code>Elixir</code> core team have any further plans about improvements to type system like mentioned <code>ex_doc</code> support or auto-generation of function <code>@spec</code>. In past we had discussions about new type definitions starting with <code>$</code> character, but I’m not sure how those topics ended up like if those are on the official roadmap or so.</p>
            </div>

              <span class="crawler-post-infos">

            <div class='post' itemprop='text'>
              <p>Any generation of <code>@spec</code> is highly unlikely. Typespecs lack negations like „anything, but an atom“ and therefore are unfit to represent the types inferred by the elixir typesystem.</p>
<p>Type signatures are on the roadmap though - see 3. in the ~15 months section. They‘ll surely become part of docs once they exist as well.</p>

              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2026-01-10T07:48:55Z' class='post-time'>

            <div class='post' itemprop='text'>
              <p>Yeah, I remember that the type system allowed more stuff. Support for negations would not look good, but is rather possible - it’s just about list every type except the excluded one. <img src="https://elixirforum.com/images/emoji/apple/sweat_smile.png?v=15" title=":sweat_smile:" class="emoji" alt=":sweat_smile:" loading="lazy" width="20" height="20"></p>
<p>Good to know they are on roadmap, but 15 months is a lot of time especially in our rapidly changing world. Within that time almost everything can change. On <code>GitHub</code> there is a discussion that if situation would go that way <code>Tailwind</code> sooner or later may become an abandonware as they loose the traffic (by 80% or so) to their documentation (which is the only place for their paid plans) due to increased LLM usage. Looks like they already lost 75% jobs there. <img src="https://elixirforum.com/images/emoji/apple/scream.png?v=15" title=":scream:" class="emoji" alt=":scream:" loading="lazy" width="20" height="20"></p>

            <div class='post' itemprop='text'>
              <aside class="quote no-group" data-username="Eiji" data-post="14" data-topic="73927">
<div class="title">
<div class="quote-controls"></div>
<img alt="" width="24" height="24" src="https://elixirforum.com/user_avatar/elixirforum.com/eiji/48/36743_2.png" class="avatar"> Eiji:</div>
<blockquote>
<p>Support for negations would not look good, but is rather possible - it’s just about list every type except the excluded one.</p>
</blockquote>
</aside>
<p>Only for the simple cases. Consider that there‘s also „anything, but a map with a <code>:name</code> key“ and you‘re thorougly in unrepresentable as typespec territory. You cannot write out all possible maps, which do not have a specific key.</p>

          <div id='post_16' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>
            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://elixirforum.com/u/michallepicki'><span itemprop='name'>michallepicki</span></a>
                
              </span>



              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2026-01-10T18:19:11Z' class='post-time'>
                    January 10, 2026,  6:19pm
                  </time>
                  <meta itemprop='dateModified' content='2026-01-10T18:19:11Z'>
              <span itemprop='position'>16</span>
              </span>
            </div>
            <div class='post' itemprop='text'>
              <p><code>1.20.rc.0</code> perf is good so far, compile times are marginally lower compared to <code>1.19.5</code>. The typechecker highlighted some dead/unreachable code to clean up, and a few missing virtual field declarations on an Ecto schema.</p>
<p>As someone else already mentioned, some tests that were asserting on <code>ArgumentError</code> or <code>FunctionClauseError</code> being thrown started to warn. Maybe there could be situations in which one would want to keep such tests, then it would be good to be able to suppress those compilation warnings somehow.</p>
            </div>

            <div itemprop="interactionStatistic" itemscope itemtype="http://schema.org/InteractionCounter">
              <meta itemprop="interactionType" content="http://schema.org/LikeAction"/>
              <meta itemprop="userInteractionCount" content="0" />
              <span class='post-likes'></span>
            </div>


            
          </div>
          <div id='post_17' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>
            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://elixirforum.com/u/GrammAcc'><span itemprop='name'>GrammAcc</span></a>
                
              </span>



              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2026-01-10T22:19:23Z' class='post-time'>
                    January 10, 2026, 10:19pm
                  </time>
                  <meta itemprop='dateModified' content='2026-01-10T22:19:23Z'>
              <span itemprop='position'>17</span>
              </span>
            </div>
            <div class='post' itemprop='text'>
              <p>I actually have this exact use-case in one of my projects. I have some common repo functions for Ecto Schema modules <code>create/1</code>, <code>create!/1</code>, <code>read/1</code>, <code>read!/1</code>, <code>update/2</code>, <code>update!/2</code>, <code>delete/1</code>, and <code>delete!/1</code> for simple single-row non-join CRUD operations. I have these defined in a <code>Models.Base</code> module and I conditionally define the <code>create</code>, <code>update</code>, and <code>delete</code> operations based on a <code>:read_only</code> option to the <code>__using__/1</code> macro. I’ve only just started doing this, so it’s not a big deal if I need to figure out an alternative, but I do like having tests in my test suite that assert my read-only schema modules throw an <code>UndefinedFunctionError</code> when calling any of the write operation functions. Just some extra piece of mind in case I forget the <code>read_only: true</code> when defining/updating a schema module. This is not a situation that would be caught by the type system since a call to <code>create!/1</code> on a should-be-read-only module would only give a typing violation if I correctly remembered to put <code>read_only: true</code>.</p>
<p>Another situation that is more common/realistic is testing program inputs. A static type system can’t protect against invalid data coming into the program at runtime, so if the application takes any kind of user input, having negative test cases to assert bad inputs are handled gracefully is useful. This is a common issue in TypeScript projects because devs get it into their heads that the compiler will catch all the type errors, and then it crashes at runtime due to bad data input by the user. Even in Elixir where we “let it crash”, that only works in embedded applications that don’t have a user looking at the loading bar when the LiveView reloads, so negative tests are good. <img src="https://elixirforum.com/images/emoji/apple/slight_smile.png?v=15" title=":slight_smile:" class="emoji" alt=":slight_smile:" loading="lazy" width="20" height="20"></p>
<p>All that being said, I am 100% in favor of better type inference if it doesn’t come with huge performance costs. The more the compiler can do for me without extra code/effort on my part the better. Thanks Elixir Team!</p>
            </div>

            <div class='post' itemprop='text'>
              <aside class="quote no-group" data-username="michallepicki" data-post="16" data-topic="73927">
<div class="title">
<div class="quote-controls"></div>
<img alt="" width="24" height="24" src="https://elixirforum.com/letter_avatar_proxy/v4/letter/m/5f9b8f/48.png" class="avatar"> michallepicki:</div>
<blockquote>
<p>Maybe there could be situations in which one would want to keep such tests, then it would be good to be able to suppress those compilation warnings somehow.</p>
</blockquote>
</aside>
<p>Indeed. For the record, in the Elixir repo, these rests are either being removed or tested by using the <code>Process.get(:unused, wrong_arg)</code> hack <a href="https://github.com/search?q=repo%3Aelixir-lang%2Felixir%20Process.get" rel="noopener nofollow ugc">(examples)</a>.</p>

            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://elixirforum.com/u/josevalim'><span itemprop='name'>josevalim</span></a>

              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2026-01-11T16:21:34Z' class='post-time'>
                    January 11, 2026,  4:21pm
                  </time>
                  <meta itemprop='dateModified' content='2026-01-11T16:21:34Z'>

            <div class='post' itemprop='text'>
              <aside class="quote no-group" data-username="GrammAcc" data-post="17" data-topic="73927">
<div class="title">
<div class="quote-controls"></div>
<img alt="" width="24" height="24" src="https://elixirforum.com/letter_avatar_proxy/v4/letter/g/9dc877/48.png" class="avatar"> GrammAcc:</div>
<blockquote>
<p>Another situation that is more common/realistic is testing program inputs.</p>
</blockquote>
</aside>
<p>To add to <a class="mention" href="/u/sabiwara">@sabiwara</a>’s workaround, the type system won’t warn if the program input is within its valid type. For example, if you have a function that expects integers only from 2..26 (like Integer.parse/2), passing an invalid input such as 0 won’t trigger any warning. However, if you give a boolean, then a warning is emitted.</p>
            </div>

            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://elixirforum.com/u/BartOtten'><span itemprop='name'>BartOtten</span></a>

              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2026-01-11T17:52:30Z' class='post-time'>
                    January 11, 2026,  5:52pm
                  </time>
                  <meta itemprop='dateModified' content='2026-01-11T17:52:30Z'>
              <span itemprop='position'>20</span>
              </span>
            </div>
            <div class='post' itemprop='text'>
              <p>No problem. We can always make a map with keys 1..26 so we can catch the issue as the keys are checked.</p>
<p>Jokes aside: any chance this could be done with this type system? Seems not impossible to me (but I have no clue)</p>
<p>(ps. I know it wont safe us from user input, but maybe it can advice to add guards to the outer layer for fail-fast)</p>
            </div>

            <div itemprop="interactionStatistic" itemscope itemtype="http://schema.org/InteractionCounter">

          <div id='post_21' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>
            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://elixirforum.com/u/GrammAcc'><span itemprop='name'>GrammAcc</span></a>
                
              </span>



              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2026-01-11T18:26:12Z' class='post-time'>
                    January 11, 2026,  6:26pm
                  </time>
                  <meta itemprop='dateModified' content='2026-01-11T18:26:12Z'>
              <span itemprop='position'>21</span>
              </span>
            </div>
            <div class='post' itemprop='text'>
              <p>Re: negative tests. I’m currently using <code>apply/3</code> for these <code>UndefinedFunctionError</code> tests since it’s a bit more intentional than a generic <code>get</code> on the module, but I don’t like the idea of using a workaround like that for a defined function where I’m passing in a boolean or string instead of an integer.</p>
<p>It’s actually a very common error if the FE is standalone JS and not server rendered for someone to accidentally call <code>.toString()</code> on a number before serializing, and then the JSON field gets parsed as <code>"1”</code> instead of <code>1</code> on the BE. For most applications, this isn’t a big deal, but I’ve ran into this when writing a very strict input validation layer before, so I think having a way to selectively disable type inference for test modules is a good feature to have. I don’t think we should have <code>@type-ignore</code> pragmas or anything that could be used anywhere we want cause that would encourage type hell, and Elixir’s <code>dynamic()</code> is much better than other langague’s <code>any</code>, so I don’t think we will need it in application code.</p>
<p>Some code is just intentionally written to violate application constraints though. Namely negative test cases. <img src="https://elixirforum.com/images/emoji/apple/slight_smile.png?v=15" title=":slight_smile:" class="emoji" alt=":slight_smile:" loading="lazy" width="20" height="20"></p>
<p>Hopefully, fuzz testing and simulation testing gets easier to implement at small scales, so this problem would eventually go away, but for now, a workaround in the language or library layers instead of the user’s test code would be ideal.</p>
<p>Maybe this could be solved with a <a href="https://hexdocs.pm/mix/main/Mix.Tasks.Compile.html#module-compilers" rel="noopener nofollow ugc">custom mix compiler</a> for ExUnit modules that disables type inference (but not type checking in general)?</p>
            </div>

          <div id='post_22' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>
            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://elixirforum.com/u/GrammAcc'><span itemprop='name'>GrammAcc</span></a>
                
              </span>



              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2026-01-11T18:29:49Z' class='post-time'>
                    January 11, 2026,  6:29pm
                  </time>
                  <meta itemprop='dateModified' content='2026-01-11T18:29:49Z'>
              <span itemprop='position'>22</span>
              </span>
            </div>
            <div class='post' itemprop='text'>
              <p>Would be great if the language tooling could somehow encourage this practice. I always advocate for doing all input parsing as close to the application boundary as possible at work and in community projects. It saves so much time later on to know that any data structure that makes it into the service layer is valid. <img src="https://elixirforum.com/images/emoji/apple/slight_smile.png?v=15" title=":slight_smile:" class="emoji" alt=":slight_smile:" loading="lazy" width="20" height="20"></p>
<p>Not sure how that would be detected though. Maybe more of a linter thing than compiler warning since it’s more of a code style/pattern issue than an actual technical problem with the code?</p>
            </div>
