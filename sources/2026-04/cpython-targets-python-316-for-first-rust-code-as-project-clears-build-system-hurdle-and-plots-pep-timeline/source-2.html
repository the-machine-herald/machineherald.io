            <div class='post' itemprop='text'>
              <h2><a name="p-277474-introduction-1" class="anchor" href="#p-277474-introduction-1" aria-label="Heading link"></a>Introduction</h2>
<p>We (<a class="mention" href="/u/emmatyping">@emmatyping</a>, <a class="mention" href="/u/eclips4">@eclips4</a>) propose introducing the Rust programming language to CPython. Rust will initially only be allowed for writing optional extension modules, <s>but eventually will become a required dependency of CPython and allowed to be used throughout the CPython code base</s> (see <a href="https://discuss.python.org/t/pre-pep-rust-for-cpython/104906/117">update here about requiring Rust</a>).</p>
<h2><a name="p-277474-motivation-2" class="anchor" href="#p-277474-motivation-2" aria-label="Heading link"></a>Motivation</h2>
<p>Rust has established itself as a popular, memory-safe systems programming language in use by a large number of projects. Memory safety is a property of a programming language which disallows out-of-bounds reads and writes to memory, as well as use-after-free errors. Rust’s safety properties are enforced by an ownership mode for code, which ensures that memory accesses are valid. Rust’s memory safety guarantees have been formally proven by the <a href="https://plv.mpi-sws.org/rustbelt/">RustBelt project</a> for code that does not use “unsafe” . By adopting Rust, entire classes of bugs, crashes, and security vulnerabilities can be eliminated from code.</p>
<p>Due to Rust’s ownership model, the language also enforces thread safety: data races are prevented at compile time. With free-threaded Python becoming officially supported and more popular, ensuring the standard library is thread safe becomes critical. Rust’s strong thread safety guarantees would ease reasoning around multi-threaded code in the CPython code base.</p>
<p>Large C/C++ based projects such as <a href="https://lore.kernel.org/lkml/202210010816.1317F2C@keescook/">the Linux kernel</a>, <a href="https://security.googleblog.com/2021/04/rust-in-android-platform.html">Android</a>, <a href="https://wiki.mozilla.org/Oxidation">Firefox</a>, and <a href="https://www.theregister.com/2025/11/03/debian_apt_to_require_rust/">many others</a> have begun adopting Rust to improve memory safety, and some are already <a href="http://security.googleblog.com/2025/11/rust-in-android-move-fast-fix-things.html">reporting positive results from this approach</a>. Furthermore, Rust has become a popular language for writing 3rd-party extension modules for Python. At the 2025 Language Summit, it was mentioned that <a href="https://pyfound.blogspot.com/2025/06/python-language-summit-2025-what-do-core-developers-want-from-rust.html">25-33% of 3rd-party Python extension modules use Rust, especially new extension modules</a>. By adopting Rust in CPython itself, we expect to encourage new contributors to extension modules.</p>
<p>CPython has historically encountered numerous bugs and crashes due to invalid memory accesses.We believe that introducing Rust into CPython would reduce the number of such issues by disallowing invalid memory accesses by construction. While there will necessarily be some unsafe operations interacting with CPython’s C API to begin with, implementing the core module logic in safe Rust would greatly reduce the amount of code which could potentially be unsafe.</p>
<p>Rust also provides “zero-cost”, well designed implementations of common data structures such as Vectors, HashMaps, Mutexes, and more. Zero cost in this context means that these data structures allow implementations to use higher-level constructs with the performance of hand-rolled implementations in other languages. The documentation for <a href="https://doc.rust-lang.org/std/">the Rust standard library</a> covers these data structures very thoroughly. By having these zero-cost, high-level abstractions we expect Rust will make it easier to implement performance-sensitive portions of CPython.</p>
<p>Rust additionally enables principled meta-programming through its macro system. Rust has two types of macros: declarative and procedural. Declarative macros in Rust are hygienic, meaning that they cannot unintentionally capture variables, unlike in C. This means it is much easier to reason about macros in Rust compared to C. Procedural macros are a way to write Rust code which does token transformations on structure definitions, functions, and more. Procedural macros are very powerful, and are used by PyO3 to ergonomically handle things like argument parsing, class definitions, and module definitions.</p>
<p>Finally, Rust has an excellent build system. Rust uses <a href="https://doc.rust-lang.org/cargo/">the Cargo package manager</a>, which handles acquiring dependencies and invoking <code>rustc</code> (the Rust compiler driver). Cargo supports vendoring dependencies out of the box, so that any Rust dependencies do not need to be downloaded (see open questions about dependencies). Furthermore, Rust has easy to set up cross-compilation which only requires installing the desired target and ensuring the proper linker is available.</p>
<p>In summary, Rust provides many extremely useful benefits that would improve CPython development. Increasing memory safety would be a significant improvement in of itself, but it is far from the only benefit Rust provides.</p>
<h2><a name="p-277474-implementation-3" class="anchor" href="#p-277474-implementation-3" aria-label="Heading link"></a>Implementation</h2>
<p>The integration of Rust would begin by adding Rust-based extension modules to the “Modules/” directory, which contains the C extensions for the Python standard library. The Rust modules would be optional at build time, dependent on if the build environment has Rust available.</p>
<p>Integrating Rust with the CPython C API requires foreign function interface (FFI) definitions in Rust to describe the APIs available. A new crate (a library in Rust terminology) <code>cpython-sys</code> will be introduced to handle these FFI definitions. To automate the process of generating Rust FFI bindings, we use <a href="https://github.com/rust-lang/rust-bindgen">bindgen</a>. Bindgen is not only an official Rust project, but also used ubiquitously throughout the Rust ecosystem to bind to C APIs, including in the Linux and Android projects. Bindgen uses libclang at build time to read C headers and automatically generate Rust FFI bindings for the current target. Unfortunately, due to the use of C macros to define some constants and methods, the <code>cpython-sys</code> crate will also need to replicate a few important APIs like <code>PYOBJECT_HEAD_INIT</code> manually. However these should all be straightforward to replicate and few in number.</p>
<p>With the C API bindings available in Rust, contributors can call the FFI definitions to interact with CPython. This will necessarily introduce some unsafe Rust code. However extension modules should be written such that there is a minimal amount of unsafe at the edges of FFI boundaries.</p>
<p>Eventually safe abstractions to simplify and standardize code like module definitions, function argument parsing, and class definitions could be adopted to reduce the amount of raw FFI code written.</p>
<p><a href="https://github.com/emmatyping/cpython/tree/rust-in-cpython">A reference implementation</a> which includes a proof-of-concept <code>_base64</code> module which uses Rust to provide a speedup to <code>base64</code> is available.</p>
<h2><a name="p-277474-distribution-4" class="anchor" href="#p-277474-distribution-4" aria-label="Heading link"></a>Distribution</h2>
<p>Rust supports <a href="https://peps.python.org/pep-0011/">all platforms which CPython supports</a> and <a href="https://doc.rust-lang.org/nightly/rustc/platform-support.html">many more as well</a>. Rust’s tiers are slightly different, and include information on whether host tools (such as <code>rustc</code> and <code>cargo</code>) are provided. Here are all of the PEP 11 platforms and their corresponding tiers for Rust:</p>

</div><p>In summary, every platform Python supports is supported Rust at tier 2 or higher, and host tools are provided for every platform other than those where Python is already cross-compiled (e.g. WASI and mobile platforms).</p>
<h2><a name="p-277474-rejected-ideas-5" class="anchor" href="#p-277474-rejected-ideas-5" aria-label="Heading link"></a>Rejected Ideas</h2>
<h4><a name="p-277474-use-pyo3httpspyo3rs-in-cpython-6" class="anchor" href="#p-277474-use-pyo3httpspyo3rs-in-cpython-6" aria-label="Heading link"></a>Use <a href="https://pyo3.rs/">PyO3</a> in CPython</h4>
<p>While CPython could depend on PyO3 for safe abstractions over CPython C APIs, this may not provide the flexibility desired. If a new API is added to the C API, it would need to be added to PyO3, then the version of PyO3 would need to be updated in CPython. This is a lot of overhead and would slow down development. Using bindgen, new APIs are automatically exposed to Rust.</p>
<h4><a name="p-277474-keep-rust-always-optional-7" class="anchor" href="#p-277474-keep-rust-always-optional-7" aria-label="Heading link"></a>Keep Rust Always-Optional</h4>
<p>Rust could provide many benefits to the development of CPython such as increased memory safety, increased thread safety, and zero-cost data structures. It would be a shame if these benefits were unavailable to the core interpreter implementation permanently.</p>
<h2><a name="p-277474-open-questions-8" class="anchor" href="#p-277474-open-questions-8" aria-label="Heading link"></a>Open Questions</h2>
<h4><a name="p-277474-how-should-we-manage-dependencies-9" class="anchor" href="#p-277474-how-should-we-manage-dependencies-9" aria-label="Heading link"></a>How should we manage dependencies?</h4>
<p>By default cargo will download dependencies which aren’t already cached locally when <code>cargo build</code> is invoked, but perhaps we should vendor these? Cargo has built-in support for vendoring code. We could also <code>cargo fetch</code> to download dependencies at any other part of the build process (such as when running configure).</p>
<h4><a name="p-277474-how-to-handle-binding-rust-code-to-cpythons-c-api-10" class="anchor" href="#p-277474-how-to-handle-binding-rust-code-to-cpythons-c-api-10" aria-label="Heading link"></a>How to handle binding Rust code to CPython’s C API?</h4>
<p>The MVP currently uses bindgen, which requires libclang at build time and a number of other dependencies. We could pre-generate the bindings for all supported platforms, which would remove the build-time requirement on vendoring bindgen and all of its dependencies (including libclang) for those platforms.</p>
<h4><a name="p-277474-when-should-rust-be-allowed-in-non-optional-parts-of-cpython-11" class="anchor" href="#p-277474-when-should-rust-be-allowed-in-non-optional-parts-of-cpython-11" aria-label="Heading link"></a>When should Rust be allowed in non-optional parts of CPython?</h4>
<p>This section is out of date, please see <a href="https://discuss.python.org/t/pre-pep-rust-for-cpython/104906/117" class="inline-onebox">Pre-PEP: Rust for CPython - #117 by emmatyping</a>. Leaving the original for the record.</p>
<p>Given the numerous advantages Rust provides, it would be advantageous to eventually introduce Rust into the core part of CPython, such as the Python string hasher, SipHash. However, requiring Rust is a significant new platform requirement. Therefore, we propose a timeline of:</p>
<ol>
<li>In Python 3.15, <code>./configure</code> will start emitting warnings if Rust is not available in the environment. Optional extension modules may start using Rust</li>
<li>In Python 3.16, <code>./configure</code> will fail if Rust is not available in the environment unless <code>--with-rust=no</code> is passed. This will ensure users are aware of the requirement of Rust on their platform in the next release</li>
<li>In Python 3.17, Python may require Rust to build</li>
</ol>
<p>We choose this timeline as it gives users several years to ensure that their platform has Rust available (most should) or otherwise plan for the migration. It also ensures that users are aware of the upcoming requirement. We hope to balance allowing time to migrate to Rust with ensuring that Rust can be adopted swiftly for its many benefits.</p>
<h4><a name="p-277474-how-to-handle-bootstrapping-rust-and-cpython-12" class="anchor" href="#p-277474-how-to-handle-bootstrapping-rust-and-cpython-12" aria-label="Heading link"></a>How to handle bootstrapping Rust and CPython</h4>
<p>Making Rust a dependency of CPython would introduce a bootstrapping problem: <a href="https://github.com/rust-lang/rust/blob/main/src/bootstrap/bootstrap.py">Rust depends on Python to bootstrap its compiler</a>. There are several workarounds to this:</p>
<ol>
<li>Rust could always ensure their bootstrap script is compatible with older versions of Python. Then the process is to build an older version of Python, build Rust, then build a newer version of CPython. The bootstrap script is currently compatible with Python 2, so this seems likely to continue to be the case</li>
<li>Rust could use PyPy to bootstrap</li>
<li>Rust could drop their usage of Python in the bootstrap process</li>
</ol>
<p>I (<a class="mention" href="/u/emmatyping">@emmatyping</a>) plan to reach out to the Rust core team and ask what their thoughts are on this issue.</p>
<h4><a name="p-277474-what-about-platforms-that-dont-support-rust-13" class="anchor" href="#p-277474-what-about-platforms-that-dont-support-rust-13" aria-label="Heading link"></a>What about platforms that don’t support Rust?</h4>
<p>Rust supports all platforms enumerated in PEP 11, but people run Python on other operating systems and architectures. Reviewing all of the issues labeled <code>OS-unsupported</code> in the CPython issue tracker, we found only a few cases where Rust would not be available:</p>
<ol>
<li>HPPA/PA-RISC: This is an old architecture from HP with the last released hardware coming out in 2005 and a community of users maintaining a Linux fork. There is no LLVM support for this architecture.</li>
<li>RISC OS: This is a community maintained version of an operating system created by Acorn Computers. There’s no support in Rust for this OS.</li>
<li>PowerPPC OS X: This older OS/architecture combination has a community of users running on PowerBooks and similar. There is no support in Rust for this OS/architecture combination, but Rust has PowerPC support for Linux.</li>
<li>CentOS 6: Rust requires glibc 2.17+, which is only available in Centos 7. However, it is unlikely users on a no-longer-supported Linux distribution will want the latest version of CPython. Even if they do, CPython would have a hard time supporting these platforms anyway.</li>
</ol>
<h4><a name="p-277474-how-should-current-cpython-contributors-learnengage-with-rust-portions-of-the-code-base-14" class="anchor" href="#p-277474-how-should-current-cpython-contributors-learnengage-with-rust-portions-of-the-code-base-14" aria-label="Heading link"></a>How should current CPython contributors learn/engage with Rust portions of the code base?</h4>
<p>Current contributors may need to interact with the Rust bindings if they modify any C APIs, including internal APIs. This process can be well covered in the devguide, and there are many great resources to learn Rust itself. <a href="https://doc.rust-lang.org/stable/book/">The Rust book</a> provides a thorough introduction to the Rust programming language. There are many other resources in addition, such as <a href="https://github.com/nrc/r4cppp">Rust for C++ programmers</a> and the official learning resources <a href="https://rust-lang.org/learn/" class="inline-onebox">Learn Rust - Rust Programming Language</a>.</p>
<p>To ease this process, we can introduce a Rust experts team on GitHub who can be pinged on issues to answer questions about interacting with the API bindings. Furthermore, we can add a Rust tutorial focused on Rust’s usage in CPython to the devguide.</p>
<p>Obviously any extension modules written in Rust will require knowledge of Rust to contribute to.</p>
<h4><a name="p-277474-what-about-argument-clinic-15" class="anchor" href="#p-277474-what-about-argument-clinic-15" aria-label="Heading link"></a>What about Argument Clinic?</h4>
<p><a href="https://peps.python.org/pep-0436/">Argument Clinic</a> is a great tool that simplifies the work of anyone writing C functions that require argument processing. We see two possible approaches for implementing it in Rust:</p>
<ol>
<li>Adapt the existing Argument Clinic to parse Rust comments using the same DSL as in C extensions, and generate Rust function signatures.</li>
<li>Create a Rust procedural macro capable of parsing a similar DSL. This approach might allow it to be used by any third-party package, whereas the C-based Argument Clinic does not guarantee compatibility with third-party extensions.</li>
</ol>
<p>Using a proc macro would allow for better IDE integration and could become useful to 3rd party extension authors.</p>
<h4><a name="p-277474-should-the-cpython-rust-crates-be-supported-for-3rd-party-use-should-there-be-a-rust-api-16" class="anchor" href="#p-277474-should-the-cpython-rust-crates-be-supported-for-3rd-party-use-should-there-be-a-rust-api-16" aria-label="Heading link"></a>Should the CPython Rust crates be supported for 3rd-party use? Should there be a Rust API?</h4>
<p>Having canonical Rust crates for bindings to CPython’s C API would be advantageous, but the project is ill-prepared to support usage by 3rd-parties at this time. Thus we propose deferring making Rust code supported for 3rd-party use until a later date.</p>

            <div class='post' itemprop='text'>
              <p>Hello, and thanks for your question!<br>

              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2025-11-17T16:45:22Z' class='post-time'>

            <div class='post' itemprop='text'>
              <p>I’m not a core dev nor expert in the internals of CPython, but I wanted to chime in to resonate with the question from <a class="mention" href="/u/megaing">@MegaIng</a> , pointing out though that it looks to me (as a Python user) that the community in general is more “approachable” in comparison to what happened during the integration of some Rust in the Linux kernel.</p>
<p>Out of curiosity, what would this mean for both <code>PyO3</code> and <a href="https://github.com/RustPython/RustPython" rel="noopener nofollow ugc"><code>RustPython</code></a>? Have you reached out to the mantainers of the latter for feedback on how to approach this possibility? If so, what’s their opinion? It looks to me like this possible PEP might benefit greatly from their experience (I don’t know if you guys are part of their team, I’m just assuming you’re not but I apologize if that’s incorrect).</p>
<p>Also, I’m probably jumping the gun with this question, but since also <code>RustPython</code> seems to be implementing the GIL in a similar fashion, would you expect some challenges in applying PEP 703 efficiently for rust-based extensions? I imagine (or rather, hope) that by the time 3.17 is out that CPython will be completely GIL-less by then. Do you expect that this additional feature will be provided smoothly in Rust extensions as well?</p>
<p>Same question applies for the new experimental JIT which should be more stable in future releases.</p>
<p>Finally, if I recall rust applications tend to be a bit “bloated” in binary size, although there are some tricks that can be done at compile time to reduce this - what do these tricks imply on performance I have no idea.</p>
            </div>

          <div id='post_5' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>
            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://discuss.python.org/u/steve.dower'><span itemprop='name'>steve.dower</span></a>

              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2025-11-17T17:04:41Z' class='post-time'>

              <span itemprop='position'>5</span>
              </span>
            </div>
            <div class='post' itemprop='text'>
              <p>As a general direction, I’d rather see “optional extension modules”<sup class="footnote-ref"><a href="#footnote-277482-1" id="footnote-ref-277482-1">[1]</a></sup> living outside the main repo and brought in later in the build/release process. Presumably such modules have no tight core dependency, or they wouldn’t be able to be optional, and so they should be able to build on pre-release runtimes and work fine with released runtimes (as we expect of 3rd party developers).</p>
<p>The bootstrapping position is discussed in the proposed text and determined to be viable. I think this position applies equally well to bootstrapping the modules we theoretically expect people to write that rely on non-core dependencies.</p>
<p>Merging in additional modules as part of our release process is fine. Bundling additional sources and optional build steps into the source tarball is fine (if we think that Linux distros will just ignore us when we say “you should include these modules in your Python runtime”).</p>
<p>For what it’s worth, I believe that the parts of CPython that directly depend on OpenSSL and Tcl/Tk are also fit for this. So don’t see my position as being about Rust itself<sup class="footnote-ref"><a href="#footnote-277482-2" id="footnote-ref-277482-2">[2]</a></sup> - it’s about the direction we should be taking with adding new modules to the core runtime.</p>
<p>In short, adding new ways to add new, non-essential modules to the core is counter to the approach we’ve been taking over the last few years. So I’m -1 on adding one.</p>
<hr class="footnotes-sep">

<ol class="footnotes-list">
<li id="footnote-277482-1" class="footnote-item"><p>Also optional regular modules. <a href="#footnote-ref-277482-1" class="footnote-backref">↩︎</a></p>
</li>
<li id="footnote-277482-2" class="footnote-item"><p>If you want my position about Rust itself, well… it’s not going to help your PEP at all <img src="https://emoji.discourse-cdn.com/apple/wink.png?v=15" title=":wink:" class="emoji" alt=":wink:" loading="lazy" width="20" height="20"> <a href="#footnote-ref-277482-2" class="footnote-backref">↩︎</a></p>
</li>
</ol>

              <p>As a Rust fan I think this is super cool! I do wonder if this is too much to figure out in one PEP, when parts of it seems pretty easily separable. I can see how the overall vision fits together, but it’s a lot.</p>

              <p>I would feel more comfortable with this if it was dependent on custom json targets stabilizing in Rust. Right now, targetting platforms that Rust itself doesn’t support still requires nightly, and python is used to bootstrap a lot of things in a lot of places.</p>

            <div class='post' itemprop='text'>
              <p>I’ll start by saying my opinion doesn’t matter here: the number of lines of C I’ve written that’s in the Python interpreter is of the order of 10, so whatever you decide it’s unlikely to be my personal problem.</p>
<p>I’m pretty convinced of Rust as a nice language to write cool new things in (and of the value of exposing cool those cool new things to be used from Python). I’m less convinced of the benefit of rewriting existing working things in Rust.<sup class="footnote-ref"><a href="#footnote-277490-1" id="footnote-ref-277490-1">[1]</a></sup></p>
<p>So from my point of view this PEP doesn’t offer a lot - it’s largely proposing “rewrite some modules in Rust with a view to soften people up to rewrite more in Rust”. I’d be much more convinced by a PEP that wanted to add something useful to the standard library and had found the best way to do that was to use a Rust library.</p>

<img alt="" width="24" height="24" src="https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/emmatyping/48/25708_2.png" class="avatar"> Emma Smith:</div>
<blockquote>
<p>Eventually safe abstractions to simplify and standardize code like module definitions, function argument parsing, and class definitions could be adopted to reduce the amount of raw FFI code written.</p>
<p><a href="https://github.com/emmatyping/cpython/tree/rust-in-cpython">A reference implementation</a> which includes a proof-of-concept <code>_base64</code> module which uses Rust to provide a speedup to <code>base64</code> is available.</p>
</blockquote>
</aside>
<p>This example shows that you really want the safe abstractions for this to be useful. Otherwise you’re doing the same kind of tedious, unsafe, error-prone low-level pointer juggling and manual reference cleanup as in C (hello <code>Py_DecRef</code> <img src="https://emoji.discourse-cdn.com/apple/cry.png?v=15" title=":cry:" class="emoji" alt=":cry:" loading="lazy" width="20" height="20">).</p>

              <span class="crawler-post-infos">

            <div class='post' itemprop='text'>
              <p>Snarky note: do we eventually have to rename CPython to CRPython? <img src="https://emoji.discourse-cdn.com/apple/slight_smile.png?v=15" title=":slight_smile:" class="emoji" alt=":slight_smile:" loading="lazy" width="20" height="20"></p>
<p>Seriously, I think this is a great development. We all know that a full rewrite in Rust won’t work, but starting to introduce Rust initially for less-essential components, and then gradually letting it take over more essential components sounds like a good plan.</p>
<p>I trust Emma and others to do a great job of guiding the discussion over the exact shape that the plan and the implementation should take.</p>

          <div id='post_13' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>
            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">

              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2025-11-17T19:13:14Z' class='post-time'>

            <div class='post' itemprop='text'>
              <p>As a PyO3 maintainer IMO it’d be really nice if we could get rid of the need for the <code>pyo3-ffi</code> crate and instead rely on bindgen bindings maintained by upstream.</p>
<p>Most of the overhead of supporting new Python versions is updating the FFI bindings.</p>
<p>I bet <a class="mention" href="/u/davidhewitt">@davidhewitt</a> has opinions about this from the PyO3 maintainer perspective and I’ll defer to him if he disagrees with me about <code>pyo3-ffi</code>.</p>
            </div>

          <div id='post_14' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>

              <span class="crawler-post-infos">

            <div class='post' itemprop='text'>
              <aside class="quote group-committers" data-username="emmatyping" data-post="1" data-topic="104906">
<div class="title">
<div class="quote-controls"></div>
<img alt="" width="24" height="24" src="https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/emmatyping/48/25708_2.png" class="avatar"> emmatyping:</div>
<blockquote>
<h4>How to handle bootstrapping Rust and CPython</h4>
<p>Making Rust a dependency of CPython would introduce a bootstrapping problem: <a href="https://github.com/rust-lang/rust/blob/main/src/bootstrap/bootstrap.py" rel="noopener nofollow ugc">Rust depends on Python to bootstrap its compiler</a>. There are several workarounds to this:</p>
<ol>
<li>Rust could always ensure their bootstrap script is compatible with older versions of Python. Then the process is to build an older version of Python, build Rust, then build a newer version of CPython. The bootstrap script is currently compatible with Python 2, so this seems likely to continue to be the case</li>
<li>Rust could use PyPy to bootstrap</li>
<li>Rust could drop their usage of Python in the bootstrap process</li>
</ol>
<p>I (<a class="mention" href="/u/emmatyping">@emmatyping</a>) plan to reach out to the Rust core team and ask what their thoughts are on this issue.</p>
</blockquote>
</aside>
<p>The specific team involved is <a href="https://rust-lang.org/governance/teams/infra/#team-bootstrap" rel="noopener nofollow ugc">T-bootstrap</a> which you can reach out to on zulip at <a href="https://rust-lang.zulipchat.com/#narrow/channel/326414-t-infra.2Fbootstrap" rel="noopener nofollow ugc">#t-infra/bootstrap</a></p>
            </div>

              <aside class="quote group-committers" data-username="guido" data-post="12" data-topic="104906">
<div class="title">
<div class="quote-controls"></div>
<img alt="" width="24" height="24" src="https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/guido/48/21_2.png" class="avatar"> Guido van Rossum:</div>
<blockquote>
<p>Snarky note: do we eventually have to rename CPython to CRPython? <img src="https://emoji.discourse-cdn.com/apple/slight_smile.png?v=15" title=":slight_smile:" class="emoji" alt=":slight_smile:" loading="lazy" width="20" height="20"></p>
</blockquote>
</aside>
<p>I would strongly advise against that, on account of people inserting an “A” into it <img src="https://emoji.discourse-cdn.com/apple/slight_smile.png?v=15" title=":slight_smile:" class="emoji" alt=":slight_smile:" loading="lazy" width="20" height="20"></p>
<p>More seriously though: Rust has been a focus for a lot of controversy and risk, with massive open questions such as the impact of a potential <a href="https://aeb.win.tue.nl/linux/hh/thompson/trust.html">Ken Thompson style compiler hack</a>. Will CPython lose trust by becoming dependent on a single specific compiler that might be subject to such a hack? Currently, CPython can be compiled using multiple different compilers (I believe gcc, clang, and MSVC are all supported - correct me if I’m wrong?), which mitigates the threat by allowing them to check each other. Adding Rust to the mix will mean that, on every platform, the same Rust compiler MUST be used.</p>
            </div>

            <div itemprop="interactionStatistic" itemscope itemtype="http://schema.org/InteractionCounter">

          </div>
          <div id='post_16' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>
            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://discuss.python.org/u/pganssle'><span itemprop='name'>pganssle</span></a>
                (Paul Ganssle)
              </span>



              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2025-11-17T19:41:22Z' class='post-time'>
                    November 17, 2025,  7:41pm
                  </time>
                  <meta itemprop='dateModified' content='2025-11-17T19:47:47Z'>
              <span itemprop='position'>16</span>
              </span>
            </div>
            <div class='post' itemprop='text'>
              <p>I have long liked the idea of doing something like this, and as someone who always introduces memory leaks and segfaults and such any time he writes any kind of C extension code, I welcome the idea of more modern zero-cost abstractions for that<sup class="footnote-ref"><a href="#footnote-277497-1" id="footnote-ref-277497-1">[1]</a></sup>.</p>
<p>However, one cost I think that has not been mentioned here is the effect that this could have on build times. In my experience, compile times for Rust (and C++) are <em>much</em> slower than for C. On my 2019 Thinkpad T480, from a fresh clone of CPython, I can build the whole thing in 2m50s (with <code>make -j</code>, and admittedly it taxes the machine):</p>
<pre data-code-wrap="python"><code class="lang-python">real	2m50.573s
user	14m57.260s
sys	0m42.975s
</code></pre>
<p>After the initial build, incremental builds are in seconds. Not sure I know of any projects of comparable size and complexity to compare with, does anyone know if (in the extreme — I know this isn’t the plan) we were to re-write CPython in Rust, how the build times would compare? I really think that the fast iteration time and low overhead from the builds is a great feature of our current build system that I would really hate to give up.</p>
<p>I guess the question is a dual one: can we write Rust in a way that it will <em>not</em> cause build times to explode and if we cannot, is the plan to keep the scope of Rust in CPython to a level where building is still very accessible?</p>
<p>My thinking is that if build times were 2x slower that would be acceptable if it meant a significant reduction in security critical bugs, but I personally wouldn’t love it if it were much slower than that.</p>
<hr class="footnotes-sep">

<ol class="footnotes-list">
<li id="footnote-277497-1" class="footnote-item"><p>On rereading, I realized that this makes it sound like I want zero-cost abstractions to help me introduce more segfaults. If it’s unclear to anyone, I meant “to avoid that”. I have left the original wording because I like to at least initially convey that I am Chaotic Neutral. <a href="#footnote-ref-277497-1" class="footnote-backref">↩︎</a></p>
</li>
</ol>
            </div>

<p>Clearly it should be “CrustyPython” <img src="https://emoji.discourse-cdn.com/apple/smiley.png?v=15" title=":smiley:" class="emoji" alt=":smiley:" loading="lazy" width="20" height="20"></p>
<p>But seriously, I’m really excited about this proposal.</p>

          <div id='post_18' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>
            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://discuss.python.org/u/jamestwebber'><span itemprop='name'>jamestwebber</span></a>

              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2025-11-17T19:55:18Z' class='post-time'>
                    November 17, 2025,  7:55pm
                  </time>
                  <meta itemprop='dateModified' content='2025-11-17T19:55:18Z'>
              <span itemprop='position'>18</span>
              </span>
            </div>
            <div class='post' itemprop='text'>
              <p>In my experience incremental Rust builds are also very fast–the initial setup (including downloading and building all the dependencies) can be slow, but it’s able to do fast incremental builds just fine.</p>
<p>Also, there’s a big difference between debug and release mode–building in debug mode is way faster. I would be surprised if this impacted iteration time unless you’re trying to rebuild the world every time.</p>

          <div id='post_19' itemprop="comment" itemscope="itemscope" itemtype="http://schema.org/Comment" class='topic-body crawler-post'>
            <div class='crawler-post-meta'>
              <span class="creator" itemprop="author" itemscope itemtype="http://schema.org/Person">
                <a itemprop="url" rel='nofollow' href='https://discuss.python.org/u/cosmicexplorer'><span itemprop='name'>cosmicexplorer</span></a>
                (danny mcClanahan)
              </span>



              <span class="crawler-post-infos">
                  <time itemprop='datePublished' datetime='2025-11-17T20:32:02Z' class='post-time'>
                    November 17, 2025,  8:32pm
                  </time>
                  <meta itemprop='dateModified' content='2025-11-17T20:32:02Z'>
              <span itemprop='position'>19</span>
              </span>
            </div>
            <div class='post' itemprop='text'>
              <p>I recently elected to try learning C++ after an entire professional career of Rust + Python, because I wanted to make a build system that can be bootstrapped in as few jumps as possible (so that it could be invoked from inside other build systems like cargo or pip). Having worked a lot on the pants build tool in python + rust, I have strong feelings about affordances the build system should provide to users—feelings I will try to quell to achieve a productive discussion.</p>
<p>The pants build tool has incorporated rust since Twitter’s “moonshot” rewrite from python-only through 2017-2019—I contributed the current iteration of our python-level interface for cacheable+parallelizable build tasks (<a href="https://www.pantsbuild.org/stable/docs/writing-plugins/the-rules-api/concepts" class="inline-onebox" rel="noopener nofollow ugc">Concepts | Pantsbuild</a>), which uses pyo3 to hook up rust async methods as “intrinsics” which can be interchanged with “async def” coroutines (Stu Hood originally proposed and implemented this approach)—we’ve had this interop since before async was stable and before pyo3 existed.</p>
<p>We used rust, so we had to use cargo. Most of a decade later, we haven’t managed to use our own build system (written in rust) to build the rust code at the heart of our system. I claim that one of the major reasons for this failure is that cargo is almost unique among build systems in providing absolutely no structured mechanisms for:<br>
(1) communicating with other package build scripts in the same dependency graph<br>
(2) communicating with the downstream user who invokes cargo (such as a distro packager, or a github actions pipeline)</p>
<p>This failure is especially notable because of the same powerful guarantees cargo ensures for rust-only dependency graphs, as described in OP:</p>
<blockquote>
<p>Finally, Rust has an excellent build system. Rust uses the Cargo package manager, which handles acquiring dependencies</p>
</blockquote>
<p>cargo unfortunately has no standard mechanism for declaring dependencies downloaded within a build script so that they can be audited or overwritten, except the excessively restricted (non-transitive) and poorly documented <code>links</code> key in Cargo.toml, which requires that a build script link a native library into the resulting executable.</p>
<p>cargo also has no standard conception of a “toolchain”, or even an ABI outside of rustc output. This can and does mean that build scripts will fail because a dependency was built for a slightly different ABI, because again, not only is there no standard interface for downstream build configuration, but there’s not even a standard interface for communicating structured data <em>across build scripts</em>. So rust devs end up doing the natural thing and using somewhere in <code>~/.cache</code> or <code>~/.config</code> or elsewhere as undocumented mutable state.</p>
<p>I am relatively confident this isn’t an oversimplification, because bootstrapping the rust compiler itself ends up invoking multiple distinct reimplementations of LLVM target triple parsing, added at different times and never synced up. This is because rustc uses cargo, and cargo does not support structured communication across build scripts.</p>
<p>I proposed some of how I wanted to help improve this situation to NGI Zero at the end of last year. This C++ system I mentioned at the beginning is a competing approach, which would replace cargo instead of attempting incremental reform. I’m still not sure of the “right” answer to this—and I don’t think fixing cargo should be the purview of this PEP anyway.</p>
<p>But I am personally convinced that if CPython were to integrate rust (possibly even just at phase 1, with only external module support), we (CPython and pypa contributors, of which I am only the latter) would necessarily have to figure out a more structured way to thread ABI info through cargo, and potentially even institute a whole structured communication mechanism across the build script dependency graph. <strong>I think that will be a lot of hard work and we should prepare for it earlier rather than later</strong>.</p>
<p>I am very heartened to read in OP that there are steps being taken to interface with the rustc team to express CPython’s bootstrapping+portability requirements. It sounds like we’re on a good trajectory already to consider the above. I would just urge contributors to consider that pants has not solved cargo’s python packaging difficulties in many years and that it may be worth opening up a greater discussion about cargo affordances in order for <em>cargo</em> (not just rustc) to support CPython’s (and consequently pypa’s) needs.</p>
            </div>

<img alt="" width="24" height="24" src="https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/pganssle/48/245_2.png" class="avatar"> pganssle:</div>
<blockquote>
<p>I guess the question is a dual one: can we write Rust in a way that it will <em>not</em> cause build times to explode and if we cannot, is the plan to keep the scope of Rust in CPython to a level where building is still very accessible?</p>
</blockquote>
</aside>
<p>The best things we can do to keep Rust build UX good for core devs (and other contributors):</p>
<p>Keep a lean dep tree – and be able to rebuild each module individually (lots of parallelism, like we have in C).</p>
<p>Have a easy to use flow that uses <code>cargo check</code>, which does type checking but doesn’t actually compile, since that gives you a very fast devloop.</p>
