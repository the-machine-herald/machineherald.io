reflection\&quot;:false,\&quot;title\&quot;:\&quot;Google Online Security Blog: Rust in the Android platform\&quot;,\&quot;clicks\&quot;:19},{\&quot;url\&quot;:\&quot;https://doc.rust-lang.org/nightly/rustc/platform-support.html\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;title\&quot;:\&quot;Platform Support - The rustc book\&quot;,\&quot;clicks\&quot;:17},{\&quot;url\&quot;:\&quot;https://wiki.mozilla.org/Oxidation\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;title\&quot;:\&quot;Oxidation - MozillaWiki\&quot;,\&quot;clicks\&quot;:14},{\&quot;url\&quot;:\&quot;https://doc.rust-lang.org/cargo/\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;title\&quot;:\&quot;Introduction - The Cargo Book\&quot;,\&quot;clicks\&quot;:6},{\&quot;url\&quot;:\&quot;https://discuss.python.org/t/rust-for-cpython-progress-update-april-2026/106895\&quot;,\&quot;internal\&quot;:true,\&quot;reflection\&quot;:true,\&quot;title\&quot;:\&quot;Rust for CPython Progress Update April 2026\&quot;,\&quot;clicks\&quot;:0}],\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;CPython core developer\&quot;,\&quot;title_is_group\&quot;:true,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:84}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:136,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/1\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null,\&quot;can_vote\&quot;:false},{\&quot;id\&quot;:277475,\&quot;name\&quot;:\&quot;Cornelius Krupp\&quot;,\&quot;username\&quot;:\&quot;MegaIng\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/megaing/{size}/16162_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T16:25:13.623Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eIsn’t the experience in the linux kernel with adding rust support as a core part more a cautionary tale? At least it looks that way from the outside. There is constant friction between the two different “types of programmers”, causing a lot of quite public disagreement. If rust becomes a requirement for core devs, might that scare away some current maintainers who don’t want to deal with it?\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:2,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T16:25:13.623Z\&quot;,\&quot;reply_count\&quot;:4,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:102,\&quot;reads\&quot;:561,\&quot;readers_count\&quot;:560,\&quot;score\&quot;:821.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Cornelius Krupp\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:12}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:21030,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/2\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277478,\&quot;name\&quot;:\&quot;Kirill Podoprigora\&quot;,\&quot;username\&quot;:\&quot;Eclips4\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/eclips4/{size}/32292_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T16:32:54.743Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eHello, and thanks for your question!\\u003cbr\\u003e\\nWe will try to make this transition as smooth as possible. We’re planning to write a “migration guide” for CPython contributors to help make their adoption of Rust as easy as possible.\\u003cbr\\u003e\\nCan this scare current maintainers? Yes.\\u003cbr\\u003e\\nWill we do everything we can to make sure it doesn’t? Absolutely.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:3,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T16:32:54.743Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:2,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:16,\&quot;reads\&quot;:561,\&quot;readers_count\&quot;:560,\&quot;score\&quot;:551.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Kirill Podoprigora\&quot;,\&quot;primary_group_name\&quot;:\&quot;committers\&quot;,\&quot;flair_name\&quot;:\&quot;committers\&quot;,\&quot;flair_url\&quot;:\&quot;https://us1.discourse-cdn.com/flex002/uploads/python1/original/1X/ca0883b21b8210c5a62c9ac02353de5f24a4d6fc.png\&quot;,\&quot;flair_bg_color\&quot;:\&quot;006b94\&quot;,\&quot;flair_color\&quot;:\&quot;fac731\&quot;,\&quot;flair_group_id\&quot;:41,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;CPython core developer\&quot;,\&quot;title_is_group\&quot;:true,\&quot;reply_to_user\&quot;:{\&quot;id\&quot;:21030,\&quot;username\&quot;:\&quot;MegaIng\&quot;,\&quot;name\&quot;:\&quot;Cornelius Krupp\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/megaing/{size}/16162_2.png\&quot;},\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:22}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:8236,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/3\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277480,\&quot;name\&quot;:\&quot;Jacopo Abramo\&quot;,\&quot;username\&quot;:\&quot;jacopoabramo\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/jacopoabramo/{size}/23840_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T16:45:22.507Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eI’m not a core dev nor expert in the internals of CPython, but I wanted to chime in to resonate with the question from \\u003ca class=\\\&quot;mention\\\&quot; href=\\\&quot;/u/megaing\\\&quot;\\u003e@MegaIng\\u003c/a\\u003e , pointing out though that it looks to me (as a Python user) that the community in general is more “approachable” in comparison to what happened during the integration of some Rust in the Linux kernel.\\u003c/p\\u003e\\n\\u003cp\\u003eOut of curiosity, what would this mean for both \\u003ccode\\u003ePyO3\\u003c/code\\u003e and \\u003ca href=\\\&quot;https://github.com/RustPython/RustPython\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\\u003e\\u003ccode\\u003eRustPython\\u003c/code\\u003e\\u003c/a\\u003e? Have you reached out to the mantainers of the latter for feedback on how to approach this possibility? If so, what’s their opinion? It looks to me like this possible PEP might benefit greatly from their experience (I don’t know if you guys are part of their team, I’m just assuming you’re not but I apologize if that’s incorrect).\\u003c/p\\u003e\\n\\u003cp\\u003eAlso, I’m probably jumping the gun with this question, but since also \\u003ccode\\u003eRustPython\\u003c/code\\u003e seems to be implementing the GIL in a similar fashion, would you expect some challenges in applying PEP 703 efficiently for rust-based extensions? I imagine (or rather, hope) that by the time 3.17 is out that CPython will be completely GIL-less by then. Do you expect that this additional feature will be provided smoothly in Rust extensions as well?\\u003c/p\\u003e\\n\\u003cp\\u003eSame question applies for the new experimental JIT which should be more stable in future releases.\\u003c/p\\u003e\\n\\u003cp\\u003eFinally, if I recall rust applications tend to be a bit “bloated” in binary size, although there are some tricks that can be done at compile time to reduce this - what do these tricks imply on performance I have no idea.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:4,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T16:45:22.507Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:80,\&quot;reads\&quot;:561,\&quot;readers_count\&quot;:560,\&quot;score\&quot;:586.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Jacopo Abramo\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;link_counts\&quot;:[{\&quot;url\&quot;:\&quot;https://github.com/RustPython/RustPython\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;title\&quot;:\&quot;GitHub - RustPython/RustPython: A Python Interpreter written in Rust\&quot;,\&quot;clicks\&quot;:110}],\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:5}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:43595,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/4\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277482,\&quot;name\&quot;:\&quot;Steve Dower\&quot;,\&quot;username\&quot;:\&quot;steve.dower\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/steve.dower/{size}/56_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T17:04:41.634Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eAs a general direction, I’d rather see “optional extension modules”\\u003csup class=\\\&quot;footnote-ref\\\&quot;\\u003e\\u003ca href=\\\&quot;#footnote-277482-1\\\&quot; id=\\\&quot;footnote-ref-277482-1\\\&quot;\\u003e[1]\\u003c/a\\u003e\\u003c/sup\\u003e living outside the main repo and brought in later in the build/release process. Presumably such modules have no tight core dependency, or they wouldn’t be able to be optional, and so they should be able to build on pre-release runtimes and work fine with released runtimes (as we expect of 3rd party developers).\\u003c/p\\u003e\\n\\u003cp\\u003eThe bootstrapping position is discussed in the proposed text and determined to be viable. I think this position applies equally well to bootstrapping the modules we theoretically expect people to write that rely on non-core dependencies.\\u003c/p\\u003e\\n\\u003cp\\u003eMerging in additional modules as part of our release process is fine. Bundling additional sources and optional build steps into the source tarball is fine (if we think that Linux distros will just ignore us when we say “you should include these modules in your Python runtime”).\\u003c/p\\u003e\\n\\u003cp\\u003eFor what it’s worth, I believe that the parts of CPython that directly depend on OpenSSL and Tcl/Tk are also fit for this. So don’t see my position as being about Rust itself\\u003csup class=\\\&quot;footnote-ref\\\&quot;\\u003e\\u003ca href=\\\&quot;#footnote-277482-2\\\&quot; id=\\\&quot;footnote-ref-277482-2\\\&quot;\\u003e[2]\\u003c/a\\u003e\\u003c/sup\\u003e - it’s about the direction we should be taking with adding new modules to the core runtime.\\u003c/p\\u003e\\n\\u003cp\\u003eIn short, adding new ways to add new, non-essential modules to the core is counter to the approach we’ve been taking over the last few years. So I’m -1 on adding one.\\u003c/p\\u003e\\n\\u003chr class=\\\&quot;footnotes-sep\\\&quot;\\u003e\\n\\n\\u003col class=\\\&quot;footnotes-list\\\&quot;\\u003e\\n\\u003cli id=\\\&quot;footnote-277482-1\\\&quot; class=\\\&quot;footnote-item\\\&quot;\\u003e\\u003cp\\u003eAlso optional regular modules. \\u003ca href=\\\&quot;#footnote-ref-277482-1\\\&quot; class=\\\&quot;footnote-backref\\\&quot;\\u003e↩︎\\u003c/a\\u003e\\u003c/p\\u003e\\n\\u003c/li\\u003e\\n\\u003cli id=\\\&quot;footnote-277482-2\\\&quot; class=\\\&quot;footnote-item\\\&quot;\\u003e\\u003cp\\u003eIf you want my position about Rust itself, well… it’s not going to help your PEP at all \\u003cimg src=\\\&quot;https://emoji.discourse-cdn.com/apple/wink.png?v=15\\\&quot; title=\\\&quot;:wink:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:wink:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e \\u003ca href=\\\&quot;#footnote-ref-277482-2\\\&quot; class=\\\&quot;footnote-backref\\\&quot;\\u003e↩︎\\u003c/a\\u003e\\u003c/p\\u003e\\n\\u003c/li\\u003e\\n\\u003c/ol\\u003e\&quot;,\&quot;post_number\&quot;:5,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T17:04:41.634Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:42,\&quot;reads\&quot;:505,\&quot;readers_count\&quot;:504,\&quot;score\&quot;:600.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Steve Dower\&quot;,\&quot;primary_group_name\&quot;:\&quot;committers\&quot;,\&quot;flair_name\&quot;:\&quot;committers\&quot;,\&quot;flair_url\&quot;:\&quot;https://us1.discourse-cdn.com/flex002/uploads/python1/original/1X/ca0883b21b8210c5a62c9ac02353de5f24a4d6fc.png\&quot;,\&quot;flair_bg_color\&quot;:\&quot;006b94\&quot;,\&quot;flair_color\&quot;:\&quot;fac731\&quot;,\&quot;flair_group_id\&quot;:41,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;CPython core developer\&quot;,\&quot;title_is_group\&quot;:true,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:19}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:54,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/5\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277483,\&quot;name\&quot;:\&quot;Alex Gaynor\&quot;,\&quot;username\&quot;:\&quot;alex_Gaynor\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/alex_gaynor/{size}/17_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T17:05:59.850Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eAs I think many folks know, I’ve been quite involved in these sorts of efforts (starting the effort that became Rust for Linux at the PyCon sprints, migrating pyca/cryptography to Rust, and helping to maintain pyo3). As a result, it will come to no one’s surprise that I’m very supportive of this pre-PEP \\u003cimg src=\\\&quot;https://emoji.discourse-cdn.com/apple/slight_smile.png?v=15\\\&quot; title=\\\&quot;:slight_smile:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:slight_smile:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eI’m happy to answer any questions folks have about those experiences and lessons learned.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:6,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T17:05:59.850Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:77,\&quot;reads\&quot;:481,\&quot;readers_count\&quot;:480,\&quot;score\&quot;:1150.6,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Alex Gaynor\&quot;,\&quot;primary_group_name\&quot;:\&quot;committers\&quot;,\&quot;flair_name\&quot;:\&quot;committers\&quot;,\&quot;flair_url\&quot;:\&quot;https://us1.discourse-cdn.com/flex002/uploads/python1/original/1X/ca0883b21b8210c5a62c9ac02353de5f24a4d6fc.png\&quot;,\&quot;flair_bg_color\&quot;:\&quot;006b94\&quot;,\&quot;flair_color\&quot;:\&quot;fac731\&quot;,\&quot;flair_group_id\&quot;:41,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;CPython core developer\&quot;,\&quot;title_is_group\&quot;:true,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:41}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:12,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/6\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277485,\&quot;name\&quot;:\&quot;James Webber\&quot;,\&quot;username\&quot;:\&quot;jamestwebber\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/jamestwebber/{size}/12799_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T17:17:51.836Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eAs a Rust fan I think this is super cool! I do wonder if this is too much to figure out in one PEP, when parts of it seems pretty easily separable. I can see how the overall vision fits together, but it’s a lot.\\u003c/p\\u003e\\n\\u003cp\\u003eWould it make sense to restrict the initial proposal as just “create the \\u003ccode\\u003ecpython-sys\\u003c/code\\u003e crate and allow optional Rust extensions in the stdlib”? That would allow iteration on making a good generic interface\\u003csup class=\\\&quot;footnote-ref\\\&quot;\\u003e\\u003ca href=\\\&quot;#footnote-277485-1\\\&quot; id=\\\&quot;footnote-ref-277485-1\\\&quot;\\u003e[1]\\u003c/a\\u003e\\u003c/sup\\u003e without requiring the SC to make a decision on the long-term plan.\\u003c/p\\u003e\\n\\u003chr class=\\\&quot;footnotes-sep\\\&quot;\\u003e\\n\\n\\u003col class=\\\&quot;footnotes-list\\\&quot;\\u003e\\n\\u003cli id=\\\&quot;footnote-277485-1\\\&quot; class=\\\&quot;footnote-item\\\&quot;\\u003e\\u003cp\\u003ethere is plenty of prior art in \\u003ccode\\u003ePyO3\\u003c/code\\u003e, and I think the \\u003ccode\\u003eHPy\\u003c/code\\u003e project has some relevance there too \\u003ca href=\\\&quot;#footnote-ref-277485-1\\\&quot; class=\\\&quot;footnote-backref\\\&quot;\\u003e↩︎\\u003c/a\\u003e\\u003c/p\\u003e\\n\\u003c/li\\u003e\\n\\u003c/ol\\u003e\&quot;,\&quot;post_number\&quot;:7,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T17:17:51.836Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:35,\&quot;reads\&quot;:477,\&quot;readers_count\&quot;:476,\&quot;score\&quot;:359.6,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;James Webber\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:6}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:12267,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/7\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277487,\&quot;name\&quot;:\&quot;Michael H\&quot;,\&quot;username\&quot;:\&quot;mikeshardmind\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/mikeshardmind/{size}/14381_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T17:31:19.898Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eI would feel more comfortable with this if it was dependent on custom json targets stabilizing in Rust. Right now, targetting platforms that Rust itself doesn’t support still requires nightly, and python is used to bootstrap a lot of things in a lot of places.\\u003c/p\\u003e\\n\\u003cp\\u003eI don’t think the impact of this is going to be reasonably predictable, and I’d want there to be a stable upstream escape hatch for those in unusual situations.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:8,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T17:31:19.898Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:12,\&quot;reads\&quot;:469,\&quot;readers_count\&quot;:468,\&quot;score\&quot;:248.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Michael H\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:6}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:15730,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/8\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277489,\&quot;name\&quot;:\&quot;Gundarin Roman\&quot;,\&quot;username\&quot;:\&quot;NamorNiradnug\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/namorniradnug/{size}/32531_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T18:17:44.410Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eDoesn’t “C“ in the name of “CPython“ means “C programming language”? If so, shouldn’t the project be eventually renamed when a significant part of it is (re)written in Rust?\\u003c/p\\u003e\\n\\u003cp\\u003e/joke, but who knows\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:9,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T18:17:44.410Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:31,\&quot;reads\&quot;:453,\&quot;readers_count\&quot;:452,\&quot;score\&quot;:439.6,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Gundarin Roman\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:13}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:79974,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:0,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/9\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277490,\&quot;name\&quot;:\&quot;Da Woods\&quot;,\&quot;username\&quot;:\&quot;da-woods\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/da-woods/{size}/7507_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T18:38:53.354Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eI’ll start by saying my opinion doesn’t matter here: the number of lines of C I’ve written that’s in the Python interpreter is of the order of 10, so whatever you decide it’s unlikely to be my personal problem.\\u003c/p\\u003e\\n\\u003cp\\u003eI’m pretty convinced of Rust as a nice language to write cool new things in (and of the value of exposing cool those cool new things to be used from Python). I’m less convinced of the benefit of rewriting existing working things in Rust.\\u003csup class=\\\&quot;footnote-ref\\\&quot;\\u003e\\u003ca href=\\\&quot;#footnote-277490-1\\\&quot; id=\\\&quot;footnote-ref-277490-1\\\&quot;\\u003e[1]\\u003c/a\\u003e\\u003c/sup\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eSo from my point of view this PEP doesn’t offer a lot - it’s largely proposing “rewrite some modules in Rust with a view to soften people up to rewrite more in Rust”. I’d be much more convinced by a PEP that wanted to add something useful to the standard library and had found the best way to do that was to use a Rust library.\\u003c/p\\u003e\\n\\u003chr\\u003e\\n\\u003cp\\u003eMinor comment:\\u003c/p\\u003e\\n\\u003caside class=\\\&quot;quote group-committers\\\&quot; data-username=\\\&quot;emmatyping\\\&quot; data-post=\\\&quot;1\\\&quot; data-topic=\\\&quot;104906\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;title\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;quote-controls\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003cimg alt=\\\&quot;\\\&quot; width=\\\&quot;24\\\&quot; height=\\\&quot;24\\\&quot; src=\\\&quot;https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/emmatyping/48/25708_2.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e emmatyping:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eRust could use PyPy to bootstrap\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eI suspect this isn’t viable for a couple for reasons: PyPy isn’t hugely well maintained right now, and (I believe) PyPy needs a Python interpreter to bootstrap itself so may not solve the problem.\\u003c/p\\u003e\\n\\u003chr class=\\\&quot;footnotes-sep\\\&quot;\\u003e\\n\\n\\u003col class=\\\&quot;footnotes-list\\\&quot;\\u003e\\n\\u003cli id=\\\&quot;footnote-277490-1\\\&quot; class=\\\&quot;footnote-item\\\&quot;\\u003e\\u003cp\\u003eAnd I think some of the push-pack Rust gets is from when people do this. It’s hard to argue with the benefit of a new and exciting feature but easy to be unimpressed with “what we already have but in Rust”. \\u003ca href=\\\&quot;#footnote-ref-277490-1\\\&quot; class=\\\&quot;footnote-backref\\\&quot;\\u003e↩︎\\u003c/a\\u003e\\u003c/p\\u003e\\n\\u003c/li\\u003e\\n\\u003c/ol\\u003e\&quot;,\&quot;post_number\&quot;:10,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T18:38:53.354Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:60,\&quot;reads\&quot;:456,\&quot;readers_count\&quot;:455,\&quot;score\&quot;:710.2,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Da Woods\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:21}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:7468,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/10\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277491,\&quot;name\&quot;:\&quot;Antoine Pitrou\&quot;,\&quot;username\&quot;:\&quot;pitrou\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/pitrou/{size}/28_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T18:48:33.079Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003caside class=\\\&quot;quote group-committers\\\&quot; data-username=\\\&quot;emmatyping\\\&quot; data-post=\\\&quot;1\\\&quot; data-topic=\\\&quot;104906\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;title\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;quote-controls\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003cimg alt=\\\&quot;\\\&quot; width=\\\&quot;24\\\&quot; height=\\\&quot;24\\\&quot; src=\\\&quot;https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/emmatyping/48/25708_2.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e Emma Smith:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eEventually safe abstractions to simplify and standardize code like module definitions, function argument parsing, and class definitions could be adopted to reduce the amount of raw FFI code written.\\u003c/p\\u003e\\n\\u003cp\\u003e\\u003ca href=\\\&quot;https://github.com/emmatyping/cpython/tree/rust-in-cpython\\\&quot;\\u003eA reference implementation\\u003c/a\\u003e which includes a proof-of-concept \\u003ccode\\u003e_base64\\u003c/code\\u003e module which uses Rust to provide a speedup to \\u003ccode\\u003ebase64\\u003c/code\\u003e is available.\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eThis example shows that you really want the safe abstractions for this to be useful. Otherwise you’re doing the same kind of tedious, unsafe, error-prone low-level pointer juggling and manual reference cleanup as in C (hello \\u003ccode\\u003ePy_DecRef\\u003c/code\\u003e \\u003cimg src=\\\&quot;https://emoji.discourse-cdn.com/apple/cry.png?v=15\\\&quot; title=\\\&quot;:cry:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:cry:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e).\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:11,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T18:48:33.079Z\&quot;,\&quot;reply_count\&quot;:2,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:38,\&quot;reads\&quot;:467,\&quot;readers_count\&quot;:466,\&quot;score\&quot;:382.6,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Antoine Pitrou\&quot;,\&quot;primary_group_name\&quot;:\&quot;committers\&quot;,\&quot;flair_name\&quot;:\&quot;committers\&quot;,\&quot;flair_url\&quot;:\&quot;https://us1.discourse-cdn.com/flex002/uploads/python1/original/1X/ca0883b21b8210c5a62c9ac02353de5f24a4d6fc.png\&quot;,\&quot;flair_bg_color\&quot;:\&quot;006b94\&quot;,\&quot;flair_color\&quot;:\&quot;fac731\&quot;,\&quot;flair_group_id\&quot;:41,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;CPython core developer\&quot;,\&quot;title_is_group\&quot;:true,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:6}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:23,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/11\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277493,\&quot;name\&quot;:\&quot;Guido van Rossum\&quot;,\&quot;username\&quot;:\&quot;guido\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/guido/{size}/21_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T19:06:36.769Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eSnarky note: do we eventually have to rename CPython to CRPython? \\u003cimg src=\\\&quot;https://emoji.discourse-cdn.com/apple/slight_smile.png?v=15\\\&quot; title=\\\&quot;:slight_smile:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:slight_smile:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eSeriously, I think this is a great development. We all know that a full rewrite in Rust won’t work, but starting to introduce Rust initially for less-essential components, and then gradually letting it take over more essential components sounds like a good plan.\\u003c/p\\u003e\\n\\u003cp\\u003eI trust Emma and others to do a great job of guiding the discussion over the exact shape that the plan and the implementation should take.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:12,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T19:06:36.769Z\&quot;,\&quot;reply_count\&quot;:3,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:547,\&quot;reads\&quot;:468,\&quot;readers_count\&quot;:467,\&quot;score\&quot;:3787.6,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Guido van Rossum\&quot;,\&quot;primary_group_name\&quot;:\&quot;committers\&quot;,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;CPython core developer\&quot;,\&quot;title_is_group\&quot;:true,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:63}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:10,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/12\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277494,\&quot;name\&quot;:\&quot;Nathan Goldbaum\&quot;,\&quot;username\&quot;:\&quot;ngoldbaum\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/ngoldbaum/{size}/12276_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T19:13:14.690Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eAs a PyO3 maintainer IMO it’d be really nice if we could get rid of the need for the \\u003ccode\\u003epyo3-ffi\\u003c/code\\u003e crate and instead rely on bindgen bindings maintained by upstream.\\u003c/p\\u003e\\n\\u003cp\\u003eMost of the overhead of supporting new Python versions is updating the FFI bindings.\\u003c/p\\u003e\\n\\u003cp\\u003eI bet \\u003ca class=\\\&quot;mention\\\&quot; href=\\\&quot;/u/davidhewitt\\\&quot;\\u003e@davidhewitt\\u003c/a\\u003e has opinions about this from the PyO3 maintainer perspective and I’ll defer to him if he disagrees with me about \\u003ccode\\u003epyo3-ffi\\u003c/code\\u003e.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:13,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T19:13:14.690Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:28,\&quot;reads\&quot;:456,\&quot;readers_count\&quot;:455,\&quot;score\&quot;:520.2,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Nathan Goldbaum\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:17}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:11747,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/13\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277495,\&quot;name\&quot;:\&quot;Ed Page\&quot;,\&quot;username\&quot;:\&quot;epage\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/epage/{size}/13922_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T19:18:19.754Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003caside class=\\\&quot;quote group-committers\\\&quot; data-username=\\\&quot;emmatyping\\\&quot; data-post=\\\&quot;1\\\&quot; data-topic=\\\&quot;104906\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;title\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;quote-controls\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003cimg alt=\\\&quot;\\\&quot; width=\\\&quot;24\\\&quot; height=\\\&quot;24\\\&quot; src=\\\&quot;https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/emmatyping/48/25708_2.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e emmatyping:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003ch4\\u003eHow to handle bootstrapping Rust and CPython\\u003c/h4\\u003e\\n\\u003cp\\u003eMaking Rust a dependency of CPython would introduce a bootstrapping problem: \\u003ca href=\\\&quot;https://github.com/rust-lang/rust/blob/main/src/bootstrap/bootstrap.py\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\\u003eRust depends on Python to bootstrap its compiler\\u003c/a\\u003e. There are several workarounds to this:\\u003c/p\\u003e\\n\\u003col\\u003e\\n\\u003cli\\u003eRust could always ensure their bootstrap script is compatible with older versions of Python. Then the process is to build an older version of Python, build Rust, then build a newer version of CPython. The bootstrap script is currently compatible with Python 2, so this seems likely to continue to be the case\\u003c/li\\u003e\\n\\u003cli\\u003eRust could use PyPy to bootstrap\\u003c/li\\u003e\\n\\u003cli\\u003eRust could drop their usage of Python in the bootstrap process\\u003c/li\\u003e\\n\\u003c/ol\\u003e\\n\\u003cp\\u003eI (\\u003ca class=\\\&quot;mention\\\&quot; href=\\\&quot;/u/emmatyping\\\&quot;\\u003e@emmatyping\\u003c/a\\u003e) plan to reach out to the Rust core team and ask what their thoughts are on this issue.\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eThe specific team involved is \\u003ca href=\\\&quot;https://rust-lang.org/governance/teams/infra/#team-bootstrap\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\\u003eT-bootstrap\\u003c/a\\u003e which you can reach out to on zulip at \\u003ca href=\\\&quot;https://rust-lang.zulipchat.com/#narrow/channel/326414-t-infra.2Fbootstrap\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\\u003e#t-infra/bootstrap\\u003c/a\\u003e\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:14,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T19:18:19.754Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:41,\&quot;reads\&quot;:450,\&quot;readers_count\&quot;:449,\&quot;score\&quot;:378.8,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Ed Page\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;link_counts\&quot;:[{\&quot;url\&quot;:\&quot;https://rust-lang.org/governance/teams/infra/#team-bootstrap\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;title\&quot;:\&quot;Infrastructure team - Rust Programming Language\&quot;,\&quot;clicks\&quot;:41},{\&quot;url\&quot;:\&quot;https://rust-lang.zulipchat.com/#narrow/channel/326414-t-infra.2Fbootstrap\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;title\&quot;:\&quot;Public view of rust-lang | Zulip team chat\&quot;,\&quot;clicks\&quot;:19}],\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:6}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:14473,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:1,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/14\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277496,\&quot;name\&quot;:\&quot;Chris Angelico\&quot;,\&quot;username\&quot;:\&quot;Rosuav\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/rosuav/{size}/3429_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T19:18:26.061Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003caside class=\\\&quot;quote group-committers\\\&quot; data-username=\\\&quot;guido\\\&quot; data-post=\\\&quot;12\\\&quot; data-topic=\\\&quot;104906\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;title\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;quote-controls\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003cimg alt=\\\&quot;\\\&quot; width=\\\&quot;24\\\&quot; height=\\\&quot;24\\\&quot; src=\\\&quot;https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/guido/48/21_2.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e Guido van Rossum:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eSnarky note: do we eventually have to rename CPython to CRPython? \\u003cimg src=\\\&quot;https://emoji.discourse-cdn.com/apple/slight_smile.png?v=15\\\&quot; title=\\\&quot;:slight_smile:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:slight_smile:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eI would strongly advise against that, on account of people inserting an “A” into it \\u003cimg src=\\\&quot;https://emoji.discourse-cdn.com/apple/slight_smile.png?v=15\\\&quot; title=\\\&quot;:slight_smile:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:slight_smile:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eMore seriously though: Rust has been a focus for a lot of controversy and risk, with massive open questions such as the impact of a potential \\u003ca href=\\\&quot;https://aeb.win.tue.nl/linux/hh/thompson/trust.html\\\&quot;\\u003eKen Thompson style compiler hack\\u003c/a\\u003e. Will CPython lose trust by becoming dependent on a single specific compiler that might be subject to such a hack? Currently, CPython can be compiled using multiple different compilers (I believe gcc, clang, and MSVC are all supported - correct me if I’m wrong?), which mitigates the threat by allowing them to check each other. Adding Rust to the mix will mean that, on every platform, the same Rust compiler MUST be used.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:15,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T19:18:26.061Z\&quot;,\&quot;reply_count\&quot;:3,\&quot;reply_to_post_number\&quot;:12,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:79,\&quot;reads\&quot;:437,\&quot;readers_count\&quot;:436,\&quot;score\&quot;:691.8,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Chris Angelico\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;link_counts\&quot;:[{\&quot;url\&quot;:\&quot;https://aeb.win.tue.nl/linux/hh/thompson/trust.html\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;clicks\&quot;:225}],\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:13}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:3377,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/15\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277497,\&quot;name\&quot;:\&quot;Paul Ganssle\&quot;,\&quot;username\&quot;:\&quot;pganssle\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/pganssle/{size}/245_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T19:41:22.635Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eI have long liked the idea of doing something like this, and as someone who always introduces memory leaks and segfaults and such any time he writes any kind of C extension code, I welcome the idea of more modern zero-cost abstractions for that\\u003csup class=\\\&quot;footnote-ref\\\&quot;\\u003e\\u003ca href=\\\&quot;#footnote-277497-1\\\&quot; id=\\\&quot;footnote-ref-277497-1\\\&quot;\\u003e[1]\\u003c/a\\u003e\\u003c/sup\\u003e.\\u003c/p\\u003e\\n\\u003cp\\u003eHowever, one cost I think that has not been mentioned here is the effect that this could have on build times. In my experience, compile times for Rust (and C++) are \\u003cem\\u003emuch\\u003c/em\\u003e slower than for C. On my 2019 Thinkpad T480, from a fresh clone of CPython, I can build the whole thing in 2m50s (with \\u003ccode\\u003emake -j\\u003c/code\\u003e, and admittedly it taxes the machine):\\u003c/p\\u003e\\n\\u003cpre data-code-wrap=\\\&quot;python\\\&quot;\\u003e\\u003ccode class=\\\&quot;lang-python\\\&quot;\\u003ereal\\t2m50.573s\\nuser\\t14m57.260s\\nsys\\t0m42.975s\\n\\u003c/code\\u003e\\u003c/pre\\u003e\\n\\u003cp\\u003eAfter the initial build, incremental builds are in seconds. Not sure I know of any projects of comparable size and complexity to compare with, does anyone know if (in the extreme — I know this isn’t the plan) we were to re-write CPython in Rust, how the build times would compare? I really think that the fast iteration time and low overhead from the builds is a great feature of our current build system that I would really hate to give up.\\u003c/p\\u003e\\n\\u003cp\\u003eI guess the question is a dual one: can we write Rust in a way that it will \\u003cem\\u003enot\\u003c/em\\u003e cause build times to explode and if we cannot, is the plan to keep the scope of Rust in CPython to a level where building is still very accessible?\\u003c/p\\u003e\\n\\u003cp\\u003eMy thinking is that if build times were 2x slower that would be acceptable if it meant a significant reduction in security critical bugs, but I personally wouldn’t love it if it were much slower than that.\\u003c/p\\u003e\\n\\u003chr class=\\\&quot;footnotes-sep\\\&quot;\\u003e\\n\\n\\u003col class=\\\&quot;footnotes-list\\\&quot;\\u003e\\n\\u003cli id=\\\&quot;footnote-277497-1\\\&quot; class=\\\&quot;footnote-item\\\&quot;\\u003e\\u003cp\\u003eOn rereading, I realized that this makes it sound like I want zero-cost abstractions to help me introduce more segfaults. If it’s unclear to anyone, I meant “to avoid that”. I have left the original wording because I like to at least initially convey that I am Chaotic Neutral. \\u003ca href=\\\&quot;#footnote-ref-277497-1\\\&quot; class=\\\&quot;footnote-backref\\\&quot;\\u003e↩︎\\u003c/a\\u003e\\u003c/p\\u003e\\n\\u003c/li\\u003e\\n\\u003c/ol\\u003e\&quot;,\&quot;post_number\&quot;:16,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T19:51:30.369Z\&quot;,\&quot;reply_count\&quot;:4,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:26,\&quot;reads\&quot;:434,\&quot;readers_count\&quot;:433,\&quot;score\&quot;:416.2,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Paul Ganssle\&quot;,\&quot;primary_group_name\&quot;:\&quot;committers\&quot;,\&quot;flair_name\&quot;:\&quot;committers\&quot;,\&quot;flair_url\&quot;:\&quot;https://us1.discourse-cdn.com/flex002/uploads/python1/original/1X/ca0883b21b8210c5a62c9ac02353de5f24a4d6fc.png\&quot;,\&quot;flair_bg_color\&quot;:\&quot;006b94\&quot;,\&quot;flair_color\&quot;:\&quot;fac731\&quot;,\&quot;flair_group_id\&quot;:41,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:2,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;CPython core developer\&quot;,\&quot;title_is_group\&quot;:true,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:12}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:195,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/16\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277499,\&quot;name\&quot;:\&quot;Barry Warsaw\&quot;,\&quot;username\&quot;:\&quot;barry\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/barry/{size}/42_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T19:51:57.260Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003caside class=\\\&quot;quote group-committers\\\&quot; data-username=\\\&quot;guido\\\&quot; data-post=\\\&quot;12\\\&quot; data-topic=\\\&quot;104906\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;title\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;quote-controls\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003cimg alt=\\\&quot;\\\&quot; width=\\\&quot;24\\\&quot; height=\\\&quot;24\\\&quot; src=\\\&quot;https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/guido/48/21_2.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e Guido van Rossum:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eSnarky note: do we eventually have to rename CPython to CRPython?\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eClearly it should be “CrustyPython” \\u003cimg src=\\\&quot;https://emoji.discourse-cdn.com/apple/smiley.png?v=15\\\&quot; title=\\\&quot;:smiley:\\\&quot; class=\\\&quot;emoji\\\&quot; alt=\\\&quot;:smiley:\\\&quot; loading=\\\&quot;lazy\\\&quot; width=\\\&quot;20\\\&quot; height=\\\&quot;20\\\&quot;\\u003e\\u003c/p\\u003e\\n\\u003cp\\u003eBut seriously, I’m really excited about this proposal.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:17,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T19:51:57.260Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:12,\&quot;quote_count\&quot;:1,\&quot;incoming_link_count\&quot;:14,\&quot;reads\&quot;:412,\&quot;readers_count\&quot;:411,\&quot;score\&quot;:512.2,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;Barry Warsaw\&quot;,\&quot;primary_group_name\&quot;:\&quot;committers\&quot;,\&quot;flair_name\&quot;:\&quot;steering-council\&quot;,\&quot;flair_url\&quot;:\&quot;fab-python\&quot;,\&quot;flair_bg_color\&quot;:\&quot;FFE873\&quot;,\&quot;flair_color\&quot;:\&quot;4B8BBE\&quot;,\&quot;flair_group_id\&quot;:45,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;Steering Council Member\&quot;,\&quot;title_is_group\&quot;:false,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:22}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:17,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/17\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277500,\&quot;name\&quot;:\&quot;James Webber\&quot;,\&quot;username\&quot;:\&quot;jamestwebber\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/jamestwebber/{size}/12799_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T19:55:18.227Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eIn my experience incremental Rust builds are also very fast–the initial setup (including downloading and building all the dependencies) can be slow, but it’s able to do fast incremental builds just fine.\\u003c/p\\u003e\\n\\u003cp\\u003eAlso, there’s a big difference between debug and release mode–building in debug mode is way faster. I would be surprised if this impacted iteration time unless you’re trying to rebuild the world every time.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:18,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T19:55:38.971Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:16,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:13,\&quot;reads\&quot;:416,\&quot;readers_count\&quot;:415,\&quot;score\&quot;:193.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;James Webber\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;reply_to_user\&quot;:{\&quot;id\&quot;:195,\&quot;username\&quot;:\&quot;pganssle\&quot;,\&quot;name\&quot;:\&quot;Paul Ganssle\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/pganssle/{size}/245_2.png\&quot;},\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:3}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:12267,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:3,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/18\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277502,\&quot;name\&quot;:\&quot;danny mcClanahan\&quot;,\&quot;username\&quot;:\&quot;cosmicexplorer\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/cosmicexplorer/{size}/31291_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T20:32:02.439Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eI recently elected to try learning C++ after an entire professional career of Rust + Python, because I wanted to make a build system that can be bootstrapped in as few jumps as possible (so that it could be invoked from inside other build systems like cargo or pip). Having worked a lot on the pants build tool in python + rust, I have strong feelings about affordances the build system should provide to users—feelings I will try to quell to achieve a productive discussion.\\u003c/p\\u003e\\n\\u003cp\\u003eThe pants build tool has incorporated rust since Twitter’s “moonshot” rewrite from python-only through 2017-2019—I contributed the current iteration of our python-level interface for cacheable+parallelizable build tasks (\\u003ca href=\\\&quot;https://www.pantsbuild.org/stable/docs/writing-plugins/the-rules-api/concepts\\\&quot; class=\\\&quot;inline-onebox\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\\u003eConcepts | Pantsbuild\\u003c/a\\u003e), which uses pyo3 to hook up rust async methods as “intrinsics” which can be interchanged with “async def” coroutines (Stu Hood originally proposed and implemented this approach)—we’ve had this interop since before async was stable and before pyo3 existed.\\u003c/p\\u003e\\n\\u003cp\\u003eWe used rust, so we had to use cargo. Most of a decade later, we haven’t managed to use our own build system (written in rust) to build the rust code at the heart of our system. I claim that one of the major reasons for this failure is that cargo is almost unique among build systems in providing absolutely no structured mechanisms for:\\u003cbr\\u003e\\n(1) communicating with other package build scripts in the same dependency graph\\u003cbr\\u003e\\n(2) communicating with the downstream user who invokes cargo (such as a distro packager, or a github actions pipeline)\\u003c/p\\u003e\\n\\u003cp\\u003eThis failure is especially notable because of the same powerful guarantees cargo ensures for rust-only dependency graphs, as described in OP:\\u003c/p\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eFinally, Rust has an excellent build system. Rust uses the Cargo package manager, which handles acquiring dependencies\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003cp\\u003ecargo unfortunately has no standard mechanism for declaring dependencies downloaded within a build script so that they can be audited or overwritten, except the excessively restricted (non-transitive) and poorly documented \\u003ccode\\u003elinks\\u003c/code\\u003e key in Cargo.toml, which requires that a build script link a native library into the resulting executable.\\u003c/p\\u003e\\n\\u003cp\\u003ecargo also has no standard conception of a “toolchain”, or even an ABI outside of rustc output. This can and does mean that build scripts will fail because a dependency was built for a slightly different ABI, because again, not only is there no standard interface for downstream build configuration, but there’s not even a standard interface for communicating structured data \\u003cem\\u003eacross build scripts\\u003c/em\\u003e. So rust devs end up doing the natural thing and using somewhere in \\u003ccode\\u003e~/.cache\\u003c/code\\u003e or \\u003ccode\\u003e~/.config\\u003c/code\\u003e or elsewhere as undocumented mutable state.\\u003c/p\\u003e\\n\\u003cp\\u003eI am relatively confident this isn’t an oversimplification, because bootstrapping the rust compiler itself ends up invoking multiple distinct reimplementations of LLVM target triple parsing, added at different times and never synced up. This is because rustc uses cargo, and cargo does not support structured communication across build scripts.\\u003c/p\\u003e\\n\\u003cp\\u003eI proposed some of how I wanted to help improve this situation to NGI Zero at the end of last year. This C++ system I mentioned at the beginning is a competing approach, which would replace cargo instead of attempting incremental reform. I’m still not sure of the “right” answer to this—and I don’t think fixing cargo should be the purview of this PEP anyway.\\u003c/p\\u003e\\n\\u003cp\\u003eBut I am personally convinced that if CPython were to integrate rust (possibly even just at phase 1, with only external module support), we (CPython and pypa contributors, of which I am only the latter) would necessarily have to figure out a more structured way to thread ABI info through cargo, and potentially even institute a whole structured communication mechanism across the build script dependency graph. \\u003cstrong\\u003eI think that will be a lot of hard work and we should prepare for it earlier rather than later\\u003c/strong\\u003e.\\u003c/p\\u003e\\n\\u003cp\\u003eI am very heartened to read in OP that there are steps being taken to interface with the rustc team to express CPython’s bootstrapping+portability requirements. It sounds like we’re on a good trajectory already to consider the above. I would just urge contributors to consider that pants has not solved cargo’s python packaging difficulties in many years and that it may be worth opening up a greater discussion about cargo affordances in order for \\u003cem\\u003ecargo\\u003c/em\\u003e (not just rustc) to support CPython’s (and consequently pypa’s) needs.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:19,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T20:32:02.439Z\&quot;,\&quot;reply_count\&quot;:2,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:62,\&quot;reads\&quot;:455,\&quot;readers_count\&quot;:454,\&quot;score\&quot;:755.4,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:104906,\&quot;topic_slug\&quot;:\&quot;pre-pep-rust-for-cpython\&quot;,\&quot;display_username\&quot;:\&quot;danny mcClanahan\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;badges_granted\&quot;:[],\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;link_counts\&quot;:[{\&quot;url\&quot;:\&quot;https://www.pantsbuild.org/stable/docs/writing-plugins/the-rules-api/concepts\&quot;,\&quot;internal\&quot;:false,\&quot;reflection\&quot;:false,\&quot;title\&quot;:\&quot;Concepts | Pantsbuild\&quot;,\&quot;clicks\&quot;:10}],\&quot;read\&quot;:true,\&quot;user_title\&quot;:\&quot;\&quot;,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:23}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:6039,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;post_url\&quot;:\&quot;/t/pre-pep-rust-for-cpython/104906/19\&quot;,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:null},{\&quot;id\&quot;:277503,\&quot;name\&quot;:\&quot;Alex Gaynor\&quot;,\&quot;username\&quot;:\&quot;alex_Gaynor\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/discuss.python.org/alex_gaynor/{size}/17_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2025-11-17T20:40:32.388Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003caside class=\\\&quot;quote group-committers\\\&quot; data-username=\\\&quot;pganssle\\\&quot; data-post=\\\&quot;16\\\&quot; data-topic=\\\&quot;104906\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;title\\\&quot;\\u003e\\n\\u003cdiv class=\\\&quot;quote-controls\\\&quot;\\u003e\\u003c/div\\u003e\\n\\u003cimg alt=\\\&quot;\\\&quot; width=\\\&quot;24\\\&quot; height=\\\&quot;24\\\&quot; src=\\\&quot;https://sea2.discourse-cdn.com/flex002/user_avatar/discuss.python.org/pganssle/48/245_2.png\\\&quot; class=\\\&quot;avatar\\\&quot;\\u003e pganssle:\\u003c/div\\u003e\\n\\u003cblockquote\\u003e\\n\\u003cp\\u003eI guess the question is a dual one: can we write Rust in a way that it will \\u003cem\\u003enot\\u003c/em\\u003e cause build times to explode and if we cannot, is the plan to keep the scope of Rust in CPython to a level where building is still very accessible?\\u003c/p\\u003e\\n\\u003c/blockquote\\u003e\\n\\u003c/aside\\u003e\\n\\u003cp\\u003eThe best things we can do to keep Rust build UX good for core devs (and other contributors):\\u003c/p\\u003e\\n\\u003cp\\u003eKeep a lean dep tree – and be able to rebuild each module individually (lots of parallelism, like we have in C).\\u003c/p\\u003e\\n\\u003cp\\u003eHave a easy to use flow that uses \\u003ccode\\u003ecargo check\\u003c/code\\u003e, which does type checking but doesn’t actually compile, since that gives you a very fast devloop.\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:20,\&quot;post_type\&quot;:1,\&quot;posts_count\&quot;:234,\&quot;updated_at\&quot;:\&quot;2025-11-17T20:40:32.388Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quo
